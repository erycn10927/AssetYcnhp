<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบทะเบียนเครื่องมือแพทย์ (Cloud Sync)</title>
    
    <!-- Core Libraries -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        input[type="date"]::-webkit-inner-spin-button, 
        input[type="date"]::-webkit-calendar-picker-indicator { opacity: 0.5; cursor: pointer; }
        @media print { 
            body { background: white; }
            .no-print { display: none !important; } 
            .sticker-print-area { 
                transform: none !important; margin: 0 !important; box-shadow: none !important; border: 2px solid #334155 !important; page-break-inside: avoid;
            } 
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-presets="react">
        (function() {
            const { useState, useEffect, useMemo, useRef } = React;

            // ==========================================
            // ⚠️ วาง URL ของ Google Apps Script ที่เพิ่ง Deploy ได้ที่นี่ ⚠️
            // ==========================================
            const GAS_URL = "https://script.google.com/macros/s/AKfycbz7G1paQN4XOrjHPPR5Bk9yMq4-3_UtzqO_EbBRqhD-cI-oyv1ma-_xhbxVNYIM4Qeu/exec"; 
            
            // ==========================================
            // ระบบไอคอน
            // ==========================================
            const Icon = ({ name, size = 16, className = "" }) => {
                const spanRef = useRef(null);
                useEffect(() => {
                    if (window.lucide && spanRef.current) {
                        spanRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
                        window.lucide.createIcons({ root: spanRef.current });
                        const svg = spanRef.current.querySelector('svg');
                        if (svg) {
                            svg.setAttribute('width', size);
                            svg.setAttribute('height', size);
                            if (className) {
                                className.split(' ').forEach(c => svg.classList.add(c));
                            }
                        }
                    }
                }, [name, size, className]);
                return <span ref={spanRef} className="inline-flex items-center justify-center"></span>;
            };

            const LucideIconsList = {
                Plus: "plus", Search: "search", X: "x", Save: "save", ArrowLeft: "arrow-left", 
                Info: "info", Wrench: "wrench", Activity: "activity", ArrowLeftRight: "arrow-left-right",
                Building2: "building-2", Tag: "tag", MapPin: "map-pin", ClipboardList: "clipboard-list", 
                ChevronRight: "chevron-right", FileText: "file-text", User: "user", Lock: "lock",
                LogIn: "log-in", LogOut: "log-out", AlertCircle: "alert-circle", Hash: "hash", 
                Printer: "printer", Stethoscope: "stethoscope", Users: "users", LayoutDashboard: "layout-dashboard",
                CircleCheck: "circle-check", Settings: "settings", FileDown: "file-down", Loader2: "loader-2", 
                RefreshCw: "refresh-cw", ShieldCheck: "shield-check", Battery: "battery", Clock: "clock", 
                CalendarClock: "calendar-clock", Calendar: "calendar", Box: "box", PlusCircle: "plus-circle", 
                Trash2: "trash-2", UserPlus: "user-plus", Shield: "shield", IdCard: "id-card", Cloud: "cloud", Database: "database"
            };

            const Icons = Object.fromEntries(
                Object.entries(LucideIconsList).map(([key, name]) => [key, (props) => <Icon name={name} {...props} />])
            );
            const { Plus, Search, X, Save, ArrowLeft, Info, Wrench, Activity, ArrowLeftRight, Building2, Tag, MapPin, ClipboardList, ChevronRight, FileText, User, Lock, LogIn, LogOut, AlertCircle, Hash, Printer, Stethoscope, Users, LayoutDashboard, CircleCheck, Settings, FileDown, Loader2, RefreshCw, ShieldCheck, Battery, Clock, CalendarClock, Calendar, Box, PlusCircle, Trash2, UserPlus, Shield, IdCard, Cloud, Database } = Icons;

            // ==========================================
            // Helper Functions
            // ==========================================
            const DEPARTMENTS = ["ER", "IPD", "LR", "OPD", "NCD", "PCU", "LAB", "ห้องยา", "ทันตกรรม", "งานคร.", "กายภาพ", "แผนไทย", "IT", "ส่วนกลาง"];
            const STATUS_OPTIONS = ["ใช้งานปกติ", "อยู่ในระยะ CAL", "แบตหมดอายุ", "ส่งซ่อม", "ไม่พร้อมใช้งาน"];

            const formatToThaiDate = (dateString) => {
                if (!dateString || dateString === "-") return "-";
                const date = new Date(dateString);
                if (isNaN(date.getTime())) return dateString;
                const d = String(date.getDate()).padStart(2, '0');
                const m = String(date.getMonth() + 1).padStart(2, '0');
                const y = date.getFullYear() + 543;
                return `${d}-${m}-${y}`;
            };

            const calculateLifespan = (receivedDate) => {
                if (!receivedDate || receivedDate === "-") return "-";
                const start = new Date(receivedDate);
                const now = new Date();
                if (start > now) return "0 ปี 0 เดือน";
                let years = now.getFullYear() - start.getFullYear();
                let months = now.getMonth() - start.getMonth();
                if (months < 0) { years--; months += 12; }
                return `${years} ปี ${months} เดือน`;
            };

            // ==========================================
            // UI Components
            // ==========================================
            const QRCodeGenerator = ({ value, size = 60 }) => {
                const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=${size}x${size}&data=${encodeURIComponent(value)}`;
                return <img src={qrUrl} alt="QR" width={size} height={size} className="bg-white border border-slate-300 p-1 rounded-md" />;
            };

            const StatusBadge = ({ status }) => {
                const config = {
                    "ใช้งานปกติ": { bg: "bg-emerald-500", text: "text-white" },
                    "อยู่ในระยะ CAL": { bg: "bg-blue-600", text: "text-white" },
                    "แบตหมดอายุ": { bg: "bg-orange-500", text: "text-white" },
                    "ส่งซ่อม": { bg: "bg-amber-400", text: "text-slate-800" },
                    "ไม่พร้อมใช้งาน": { bg: "bg-rose-600", text: "text-white" }
                }[status] || { bg: "bg-slate-500", text: "text-white" };

                return (
                    <div className={`${config.bg} ${config.text} px-2 py-0.5 rounded-full border border-slate-400/30 flex items-center gap-1.5 shadow-sm`}>
                        <span className="w-1.5 h-1.5 rounded-full bg-white animate-pulse"></span>
                        <span className="text-[10px] font-bold uppercase tracking-tight">{status}</span>
                    </div>
                );
            };

            const InputField = ({ label, value, onChange, placeholder, type = "text", options = null, icon }) => (
                <div className="flex flex-col gap-1 w-full">
                    <label className="text-[12px] font-bold text-slate-600 flex items-center gap-1.5 ml-0.5">
                        {icon} {label}
                    </label>
                    {options ? (
                        <select 
                            className="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-xl focus:border-blue-500 focus:bg-white outline-none transition text-[14px] font-medium"
                            value={value || ''}
                            onChange={e => onChange(e.target.value)}
                        >
                            <option value="">เลือก{label}</option>
                            {options.map(opt => <option key={opt} value={opt}>{opt}</option>)}
                        </select>
                    ) : (
                        <input 
                            type={type} 
                            placeholder={placeholder || '...'} 
                            className="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-xl focus:border-blue-500 focus:bg-white outline-none transition text-[14px] font-medium"
                            value={value || ''} 
                            onChange={e => onChange(e.target.value)} 
                        />
                    )}
                </div>
            );

            const LoginView = ({ onLogin, error, loading }) => {
                const [form, setForm] = useState({ username: '', password: '' });
                return (
                    <div className="min-h-screen flex items-center justify-center bg-slate-50 p-6 animate-fade-in">
                        <div className="w-full max-w-xs bg-white rounded-3xl shadow-2xl border border-slate-300 overflow-hidden">
                            <div className="bg-blue-600 p-8 text-white text-center relative overflow-hidden">
                                <div className="absolute top-0 right-0 opacity-10 translate-x-4 -translate-y-4"><Cloud size={100}/></div>
                                <Stethoscope size={44} className="mx-auto mb-4 opacity-80 relative z-10"/>
                                <h1 className="text-xl font-black uppercase relative z-10 leading-normal">ระบบทะเบียน<br/>เครื่องมือแพทย์</h1>
                                <p className="text-[11px] opacity-90 mt-2 uppercase tracking-widest font-bold relative z-10 text-blue-200">ระบบคลาวด์ • รพ.ยางชุมน้อย</p>
                            </div>
                            <form onSubmit={(e) => onLogin(e, form)} className="p-6 space-y-4 relative z-20">
                                {error && <div className="p-3 bg-rose-50 border border-rose-200 text-rose-600 text-[13px] font-bold rounded-lg flex items-start gap-2 break-words leading-normal"><AlertCircle size={18} className="shrink-0 mt-0.5" /> <span dangerouslySetInnerHTML={{__html: error}}></span></div>}
                                <InputField label="ชื่อผู้ใช้" icon={<User size={14} className="text-blue-500"/>} value={form.username} onChange={v => setForm({...form, username: v})} />
                                <InputField label="รหัสผ่าน" type="password" icon={<Lock size={14} className="text-blue-500"/>} value={form.password} onChange={v => setForm({...form, password: v})} />
                                <button disabled={loading} type="submit" className="w-full py-3 bg-blue-600 text-white rounded-xl font-black border border-blue-700 flex items-center justify-center gap-2 mt-4 uppercase disabled:opacity-50 transition-all hover:bg-blue-700 active:scale-95 shadow-md">
                                    {loading ? <Loader2 className="animate-spin" size={18}/> : <LogIn size={18}/>}
                                    {loading ? 'เชื่อมต่อ Cloud...' : 'เข้าสู่ระบบ'}
                                </button>
                                <p className="text-center text-[11px] font-bold text-slate-400 mt-2 border-t border-slate-100 pt-3">ซิงค์ข้อมูลกับ Google Sheets อัตโนมัติ</p>
                            </form>
                        </div>
                    </div>
                );
            };

            // ==========================================
            // Main Application
            // ==========================================
            const App = () => {
                const [assets, setAssets] = useState([]);
                const [users, setUsers] = useState([]);
                const [currentUserData, setCurrentUserData] = useState(null);
                
                const [loading, setLoading] = useState(false);
                const [alert, setAlert] = useState(null);
                const [view, setView] = useState('dashboard');
                const [searchQuery, setSearchQuery] = useState('');
                const [filterDept, setFilterDept] = useState('ทั้งหมด');
                
                const [isAddModalOpen, setIsAddModalOpen] = useState(false);
                const [addModalTab, setAddModalTab] = useState('general');
                const [selectedAsset, setSelectedAsset] = useState(null);
                const [historyModal, setHistoryModal] = useState({ open: false, type: '', data: {} });

                const [isUserModalOpen, setIsUserModalOpen] = useState(false);
                const [userFormData, setUserFormData] = useState({
                    username: '', password: '', name: '', surname: '', position: '', department: 'ER', role: 'user'
                });

                const initialFormState = { 
                    fsn: '', id: '', gf: '', name: '', model: '', serialNo: '', vendor: '', department: 'ER',
                    receivedDate: '', warrantyExpire: '', lifespan: '', batteryChangeDate: '', status: 'ใช้งานปกติ',
                    repairDate: '', repairSymptom: '', repairSummary: '', repairFix: '',
                    calDate: '', calResult: '', calBy: '', calDue: '',
                    loanDate: '', loanItem: '', loanAmount: '1', loanPerson: '', loanStatus: 'ยังไม่คืน'
                };
                const [assetFormData, setAssetFormData] = useState(initialFormState);

                useEffect(() => {
                    if (assetFormData.receivedDate) {
                        setAssetFormData(prev => ({ ...prev, lifespan: calculateLifespan(prev.receivedDate) }));
                    }
                }, [assetFormData.receivedDate]);

                // โหลดข้อมูลจาก Google Sheets (Cloud Sync)
                const fetchDatabase = async () => {
                    if(!GAS_URL || GAS_URL.includes("นำ_URL")) {
                        setAlert({ message: "<b>ไม่ได้ใส่ URL!</b><br/>กรุณานำ URL จาก Google Apps Script มาใส่ในโค้ดบรรทัดที่ 46 ก่อนครับ", type: "error" });
                        return false;
                    }
                    try {
                        const response = await fetch(GAS_URL, { redirect: "follow" });
                        const textData = await response.text(); 
                        try {
                            const result = JSON.parse(textData);
                            if (result.status === "error") throw new Error(result.message);
                            setAssets(result.assets || []);
                            setUsers(result.users || []);
                            return true;
                        } catch (parseError) {
                            if (textData.includes("<html")) {
                                setAlert({ message: "<b>Google ปิดกั้นการเข้าถึง!</b><br/>กลับไปแก้ที่ Deploy > Who has access ให้เป็น 'Anyone' (ทุกคน) ครับ", type: "error" });
                            } else {
                                setAlert({ message: "ไม่สามารถอ่านข้อมูลจาก Google Sheets ได้", type: "error" });
                            }
                            return false;
                        }
                    } catch (error) {
                        setAlert({ message: "ไม่สามารถเชื่อมต่ออินเทอร์เน็ตหรือเซิร์ฟเวอร์ได้", type: "error" });
                        return false;
                    }
                };

                // ส่งข้อมูลไปบันทึกบน Google Sheets (Cloud Sync)
                const sendToDatabase = async (action, payload) => {
                    try {
                        const response = await fetch(GAS_URL, {
                            method: "POST",
                            headers: { "Content-Type": "text/plain;charset=utf-8" }, // เลี่ยง CORS
                            body: JSON.stringify({ action, payload }),
                            redirect: "follow"
                        });
                        const textData = await response.text();
                        try {
                            return JSON.parse(textData);
                        } catch(e) {
                             throw new Error("เซิร์ฟเวอร์ Google ตอบกลับผิดพลาด โปรดเช็คสิทธิ์แบบ Anyone");
                        }
                    } catch (error) {
                        console.error(`Action [${action}] failed:`, error);
                        throw error;
                    }
                };

                const handleLogin = async (e, form) => {
                    e.preventDefault();
                    setLoading(true);
                    
                    const isSuccess = await fetchDatabase();
                    
                    if (isSuccess) {
                        setUsers(prevUsers => {
                            if(prevUsers.length === 0) {
                                setAlert({ message: "ยังไม่มีผู้ใช้ในระบบเลย กรุณาตรวจสอบ Google Sheets", type: "error" });
                                return prevUsers;
                            }
                            const user = prevUsers.find(u => u.username === form.username && u.password === form.password);
                            if (user) {
                                setCurrentUserData(user);
                                setAlert({ message: `เข้าสู่ระบบสำเร็จ ยินดีต้อนรับคุณ ${user.name}`, type: "success" });
                            } else {
                                setAlert({ message: "ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง", type: "error" });
                            }
                            return prevUsers;
                        });
                    }
                    
                    setLoading(false);
                    setTimeout(() => setAlert(null), 3000);
                };

                const handleAddUser = async (e) => {
                    e.preventDefault();
                    if(!userFormData.username || !userFormData.password || !userFormData.name) {
                        setAlert({ message: "กรุณากรอกข้อมูลสำคัญให้ครบถ้วน", type: "error" });
                        setTimeout(() => setAlert(null), 3000);
                        return;
                    }
                    if(users.some(u => u.username === userFormData.username)) {
                        setAlert({ message: "Username นี้มีในระบบแล้ว", type: "error" });
                        setTimeout(() => setAlert(null), 3000);
                        return;
                    }

                    const newUser = { ...userFormData, id: Date.now().toString() };
                    setLoading(true);
                    
                    try {
                        const res = await sendToDatabase("addUser", newUser);
                        if(res.status === "success") {
                            setUsers([...users, newUser]);
                            setIsUserModalOpen(false);
                            setUserFormData({ username: '', password: '', name: '', surname: '', position: '', department: 'ER', role: 'user' });
                            setAlert({ message: "เพิ่มผู้ใช้งานสำเร็จ (ซิงค์ลง Cloud แล้ว)", type: "success" });
                        } else throw new Error(res.message);
                    } catch(err) {
                        setAlert({ message: "เกิดข้อผิดพลาด: " + err.message, type: "error" });
                    } finally {
                        setLoading(false);
                        setTimeout(() => setAlert(null), 3000);
                    }
                };

                const handleDeleteUser = async (userId) => {
                    if(userId === currentUserData.id) return window.alert("ไม่สามารถลบบัญชีที่กำลังใช้งานอยู่ได้");
                    if(window.confirm("ยืนยันการลบผู้ใช้งานนี้ออกจากระบบ?")) {
                        setLoading(true);
                        try {
                            const res = await sendToDatabase("deleteUser", { id: userId });
                            if(res.status === "success") {
                                setUsers(users.filter(u => u.id !== userId));
                                setAlert({ message: "ลบผู้ใช้ออกจากระบบสำเร็จ", type: "success" });
                            } else throw new Error(res.message);
                        } catch(err) {
                            setAlert({ message: "ลบข้อมูลล้มเหลว: " + err.message, type: "error" });
                        } finally {
                            setLoading(false);
                            setTimeout(() => setAlert(null), 3000);
                        }
                    }
                };

                const handleAddAsset = async (e) => {
                    e.preventDefault();
                    if (!assetFormData.id || !assetFormData.name) {
                        setAlert({ message: "กรุณากรอกรหัสและชื่อเครื่องมือ (Tab 1)", type: "error" });
                        setTimeout(() => setAlert(null), 3000);
                        return;
                    }
                    
                    const newAsset = {
                        docId: Date.now().toString(),
                        createdAt: new Date().toISOString(),
                        recordedBy: `${currentUserData.name} ${currentUserData.surname}`,
                        
                        fsn: assetFormData.fsn, id: assetFormData.id, gf: assetFormData.gf,
                        name: assetFormData.name, model: assetFormData.model, serialNo: assetFormData.serialNo,
                        vendor: assetFormData.vendor, department: assetFormData.department,
                        receivedDate: assetFormData.receivedDate, warrantyExpire: assetFormData.warrantyExpire,
                        lifespan: assetFormData.lifespan, batteryChangeDate: assetFormData.batteryChangeDate,
                        status: assetFormData.status,

                        repairHistory: (assetFormData.repairDate || assetFormData.repairSymptom) 
                            ? [{ id: Date.now()+1, date: assetFormData.repairDate, symptom: assetFormData.repairSymptom, summary: assetFormData.repairSummary, fix: assetFormData.repairFix, recordedBy: currentUserData.name }] : [],
                        calHistory: (assetFormData.calDate || assetFormData.calResult) 
                            ? [{ id: Date.now()+2, date: assetFormData.calDate, result: assetFormData.calResult, by: assetFormData.calBy, due: assetFormData.calDue, recordedBy: currentUserData.name }] : [],
                        loanHistory: (assetFormData.loanDate || assetFormData.loanPerson) 
                            ? [{ id: Date.now()+3, date: assetFormData.loanDate, item: assetFormData.loanItem, name: assetFormData.loanPerson, amount: assetFormData.loanAmount, status: assetFormData.loanStatus, recordedBy: currentUserData.name }] : []
                    };
                    
                    setLoading(true);
                    try {
                        const res = await sendToDatabase("addAsset", newAsset);
                        if(res.status === "success") {
                            setAssets([newAsset, ...assets]);
                            setIsAddModalOpen(false);
                            setAssetFormData(initialFormState);
                            setAddModalTab('general');
                            setAlert({ message: "ซิงค์ข้อมูลลง Google Sheets สำเร็จ!", type: "success" });
                        } else throw new Error(res.message);
                    } catch(err) {
                        setAlert({ message: "ซิงค์ข้อมูลล้มเหลว: " + err.message, type: "error" });
                    } finally {
                        setLoading(false);
                        setTimeout(() => setAlert(null), 3000);
                    }
                };

                const handleAddHistory = async (e) => {
                    e.preventDefault();
                    setLoading(true);
                    
                    const assetToUpdate = assets.find(a => a.docId === selectedAsset.docId);
                    if(!assetToUpdate) return;
                    
                    let updatedAsset = { ...assetToUpdate };
                    const newHist = { ...historyModal.data, id: Date.now(), recordedBy: `${currentUserData.name} ${currentUserData.surname}` };
                    
                    if (historyModal.type === 'repair') {
                        updatedAsset.repairHistory = [newHist, ...(updatedAsset.repairHistory || [])];
                    } else if (historyModal.type === 'cal') {
                        updatedAsset.calHistory = [newHist, ...(updatedAsset.calHistory || [])];
                    } else if (historyModal.type === 'loan') {
                        updatedAsset.loanHistory = [newHist, ...(updatedAsset.loanHistory || [])];
                    }

                    try {
                        const res = await sendToDatabase("updateAsset", updatedAsset);
                        if(res.status === "success") {
                            setAssets(assets.map(a => a.docId === updatedAsset.docId ? updatedAsset : a));
                            setSelectedAsset(updatedAsset);
                            setHistoryModal({ open: false, type: '', data: {} });
                            setAlert({ message: "อัปเดตประวัติขึ้น Cloud สำเร็จ", type: "success" });
                        } else throw new Error(res.message);
                    } catch(err) {
                        setAlert({ message: "อัปเดตข้อมูลล้มเหลว: " + err.message, type: "error" });
                    } finally {
                        setLoading(false);
                        setTimeout(() => setAlert(null), 3000);
                    }
                };

                const handleDeleteAsset = async (assetId) => {
                    if(window.confirm("คำเตือน: คุณกำลังลบข้อมูลนี้ถาวร ยืนยันการลบ?")) {
                        setLoading(true);
                        try {
                            const res = await sendToDatabase("deleteAsset", { docId: assetId });
                            if(res.status === "success") {
                                setAssets(assets.filter(a => a.docId !== assetId));
                                setView('dashboard');
                                setAlert({ message: "ลบข้อมูลออกจากระบบสำเร็จ", type: "success" });
                            } else throw new Error(res.message);
                        } catch(err) {
                            setAlert({ message: "ลบข้อมูลล้มเหลว: " + err.message, type: "error" });
                        } finally {
                            setLoading(false);
                            setTimeout(() => setAlert(null), 3000);
                        }
                    }
                };

                const refreshData = async () => {
                    setLoading(true);
                    const isSuccess = await fetchDatabase();
                    setLoading(false);
                    if(isSuccess) {
                        setAlert({ message: "ดึงข้อมูลล่าสุดจาก Google Sheets แล้ว", type: "success" });
                        setTimeout(() => setAlert(null), 2000);
                    }
                };

                const handleExport = () => {
                    const headers = ["ID", "ชื่อเครื่องมือ", "แผนก", "สถานะ", "อายุเครื่อง", "ผู้บันทึกล่าสุด"];
                    const rows = assets.map(a => [
                        a.id, `"${a.name}"`, a.department, a.status, calculateLifespan(a.receivedDate), `"${a.recordedBy || '-'}"`
                    ]);
                    const content = "\uFEFF" + [headers, ...rows].map(r => r.join(",")).join("\n");
                    const blob = new Blob([content], { type: "text/csv;charset=utf-8;" });
                    const link = document.createElement("a");
                    link.href = URL.createObjectURL(blob);
                    link.download = `รายงานเครื่องมือแพทย์_${new Date().toLocaleDateString()}.csv`;
                    link.click();
                };

                const filteredAssets = useMemo(() => {
                    return assets.filter(a => 
                        (String(a.name || "").toLowerCase().includes(searchQuery.toLowerCase()) || String(a.id || "").includes(searchQuery)) && 
                        (filterDept === 'ทั้งหมด' || a.department === filterDept)
                    );
                }, [assets, searchQuery, filterDept]);

                if (!currentUserData) return <LoginView onLogin={handleLogin} loading={loading} error={alert?.type === 'error' ? alert.message : null} />;

                return (
                    <div className="bg-[#fcfdfe] min-h-screen pb-10">
                        {/* Alerts */}
                        {alert && (
                            <div className={`fixed top-5 left-1/2 -translate-x-1/2 z-[300] px-6 py-3 rounded-full border shadow-xl flex items-center gap-2 animate-fade-in ${alert.type === 'error' ? 'bg-rose-50 border-rose-500 text-rose-700' : 'bg-emerald-50 border-emerald-500 text-emerald-700'}`}>
                                {alert.type === 'error' ? <AlertCircle size={18} className="shrink-0"/> : <CircleCheck size={18} className="shrink-0"/>}
                                <span className="font-bold text-sm leading-normal" dangerouslySetInnerHTML={{__html: alert.message}}></span>
                            </div>
                        )}

                        {/* Full Screen Loading Overlay */}
                        {loading && (
                            <div className="fixed inset-0 bg-white/60 backdrop-blur-sm z-[500] flex flex-col items-center justify-center gap-3">
                                <Loader2 className="animate-spin text-blue-600" size={50}/>
                                <p className="text-blue-800 font-bold tracking-widest uppercase text-sm animate-pulse">Syncing Cloud Database...</p>
                            </div>
                        )}

                        <div className="max-w-6xl mx-auto px-4 pt-6 space-y-4">
                            {/* Header */}
                            <header className="flex flex-col md:flex-row justify-between items-center gap-4 py-4 border-b border-slate-200 no-print">
                                <div className="flex items-center gap-3 w-full md:w-auto justify-between md:justify-start">
                                    <div className="flex items-center gap-4">
                                        <div className="bg-blue-600 p-3 rounded-xl text-white shadow-md relative shrink-0">
                                            <Cloud size={28} className="relative z-10"/>
                                            <span className="absolute top-1 right-1 w-2.5 h-2.5 bg-emerald-400 border-2 border-blue-600 rounded-full animate-pulse z-20"></span>
                                        </div>
                                        <div>
                                            <h1 className="text-xl md:text-2xl font-black text-slate-800 uppercase tracking-tighter leading-normal">ระบบทะเบียนเครื่องมือแพทย์</h1>
                                            <p className="text-xs text-blue-600 font-bold flex items-center gap-1 mt-0.5 uppercase tracking-widest"><MapPin size={12} /> โรงพยาบาลยางชุมน้อย จังหวัดศรีสะเกษ</p>
                                        </div>
                                    </div>
                                </div>
                                
                                <div className="flex flex-wrap md:flex-nowrap items-center gap-3 w-full md:w-auto border-t md:border-none pt-4 md:pt-0 border-slate-200">
                                    {/* Profile display at top right */}
                                    <div className="bg-white border border-slate-300 rounded-xl px-4 py-2 flex items-center gap-3 shadow-sm w-full md:w-auto justify-center">
                                        <div className="text-right flex flex-col justify-center">
                                            <p className="text-slate-900 text-[14px] font-black leading-normal">{currentUserData.name} {currentUserData.surname}</p>
                                            <p className="text-slate-500 text-[11px] font-bold uppercase tracking-widest">{currentUserData.position} | {currentUserData.department}</p>
                                        </div>
                                        <div className={`w-10 h-10 rounded-full flex items-center justify-center text-white shadow-inner shrink-0 ${currentUserData.role === 'admin' ? 'bg-gradient-to-br from-rose-500 to-rose-700' : 'bg-gradient-to-br from-blue-500 to-blue-700'}`}>
                                            {currentUserData.role === 'admin' ? <Shield size={18}/> : <User size={18}/>}
                                        </div>
                                    </div>
                                    <div className="flex flex-wrap gap-2 w-full md:w-auto justify-center">
                                        <button onClick={refreshData} title="อัปเดตข้อมูลจากเซิร์ฟเวอร์" className="p-2.5 bg-blue-50 text-blue-600 border border-blue-200 rounded-xl shadow-sm hover:bg-blue-100 transition-all"><RefreshCw size={18}/></button>
                                        {currentUserData.role === 'admin' && (
                                            <button onClick={() => setView(view === 'users' ? 'dashboard' : 'users')} title="จัดการผู้ใช้งาน" className={`p-2.5 rounded-xl border transition-all shadow-sm ${view === 'users' ? 'bg-slate-800 text-white border-slate-900' : 'bg-white border-slate-300 text-slate-600 hover:bg-slate-50'}`}>
                                                <Users size={18}/>
                                            </button>
                                        )}
                                        <button onClick={handleExport} title="ส่งออก Excel" className="p-2.5 bg-emerald-50 text-emerald-600 border border-emerald-200 rounded-xl shadow-sm hover:bg-emerald-100 transition-all"><FileDown size={18}/></button>
                                        <button onClick={() => { setAssetFormData(initialFormState); setAddModalTab('general'); setIsAddModalOpen(true); }} className="flex-1 md:flex-none bg-blue-600 text-white px-5 py-2.5 rounded-xl text-sm font-black border border-blue-700 shadow-md uppercase tracking-wide hover:bg-blue-700 active:scale-95 transition-all flex items-center justify-center gap-2 whitespace-nowrap"><Plus size={16}/> ลงทะเบียน</button>
                                        <button onClick={() => { setCurrentUserData(null); setView('dashboard'); }} title="ออกจากระบบ" className="p-2.5 bg-white border border-slate-300 rounded-xl shadow-sm text-rose-500 hover:bg-rose-50 transition-all"><LogOut size={18} /></button>
                                    </div>
                                </div>
                            </header>

                            {/* View: User Management (Admin Only) */}
                            {view === 'users' && currentUserData.role === 'admin' ? (
                                <div className="space-y-6 animate-fade-in py-4">
                                    <div className="flex flex-col md:flex-row justify-between md:items-end gap-4">
                                        <div>
                                            <h2 className="text-2xl font-black flex items-center gap-2"><Users className="text-blue-600"/> จัดการผู้ใช้งานระบบ</h2>
                                            <p className="text-sm font-bold text-slate-500">ซิงค์ผู้ใช้กับบัญชี Cloud (Google Sheets)</p>
                                        </div>
                                        <button onClick={() => setIsUserModalOpen(true)} className="bg-slate-900 text-white px-5 py-2.5 rounded-xl font-bold flex items-center justify-center gap-2 shadow-md hover:bg-slate-800 active:scale-95 transition-all whitespace-nowrap w-full md:w-auto"><UserPlus size={16}/> เพิ่มผู้ใช้ใหม่</button>
                                    </div>

                                    <div className="bg-white rounded-3xl border border-slate-300 shadow-sm overflow-hidden">
                                        <div className="overflow-x-auto">
                                            <table className="w-full text-left text-sm whitespace-nowrap">
                                                <thead className="bg-slate-50 border-b border-slate-200 text-slate-500 uppercase text-[12px] font-black tracking-widest">
                                                    <tr>
                                                        <th className="p-4">ชื่อ - นามสกุล</th>
                                                        <th className="p-4">ตำแหน่ง / หน่วยงาน</th>
                                                        <th className="p-4">Username (Login)</th>
                                                        <th className="p-4">สิทธิ์การใช้งาน</th>
                                                        <th className="p-4 text-center">จัดการ</th>
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y divide-slate-100">
                                                    {users.map(u => (
                                                        <tr key={u.id} className="hover:bg-slate-50/50">
                                                            <td className="p-4 font-black text-slate-800">{u.name} {u.surname}</td>
                                                            <td className="p-4 font-bold text-slate-500">{u.position} <br/><span className="text-[11px] uppercase text-blue-500">{u.department}</span></td>
                                                            <td className="p-4 font-black">{u.username}</td>
                                                            <td className="p-4">
                                                                <span className={`px-3 py-1.5 rounded-lg text-[11px] font-black uppercase tracking-widest ${u.role === 'admin' ? 'bg-rose-100 text-rose-700' : 'bg-blue-100 text-blue-700'}`}>
                                                                    {u.role}
                                                                </span>
                                                            </td>
                                                            <td className="p-4 text-center">
                                                                <button onClick={() => handleDeleteUser(u.id)} disabled={u.id === currentUserData.id} className="p-2 bg-white border border-slate-200 rounded-lg text-slate-400 hover:text-rose-500 hover:bg-rose-50 disabled:opacity-30 disabled:hover:bg-white transition-all"><Trash2 size={16}/></button>
                                                            </td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                    
                                    {/* Modal: Add User */}
                                    {isUserModalOpen && (
                                        <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-[200] flex items-center justify-center p-4">
                                            <div className="bg-white w-full max-w-lg rounded-3xl p-8 shadow-2xl border border-slate-300 animate-fade-in relative z-10">
                                                <h2 className="text-xl font-black uppercase mb-6 flex justify-between items-center"><span className="flex items-center gap-2"><UserPlus className="text-blue-600"/> เพิ่มผู้ใช้งานใหม่</span> <button type="button" onClick={() => setIsUserModalOpen(false)} className="text-slate-400 hover:text-slate-800"><X size={24}/></button></h2>
                                                <form onSubmit={handleAddUser} className="space-y-4">
                                                    <div className="grid grid-cols-2 gap-4">
                                                        <InputField label="ชื่อ" value={userFormData.name} onChange={v => setUserFormData({...userFormData, name: v})} icon={<IdCard size={14} className="text-blue-500"/>}/>
                                                        <InputField label="นามสกุล" value={userFormData.surname} onChange={v => setUserFormData({...userFormData, surname: v})} icon={<IdCard size={14} className="text-blue-500"/>}/>
                                                    </div>
                                                    <div className="grid grid-cols-2 gap-4">
                                                        <InputField label="ตำแหน่ง" value={userFormData.position} onChange={v => setUserFormData({...userFormData, position: v})} icon={<Tag size={14} className="text-blue-500"/>}/>
                                                        <InputField label="หน่วยงาน" value={userFormData.department} options={DEPARTMENTS} onChange={v => setUserFormData({...userFormData, department: v})} icon={<Building2 size={14} className="text-blue-500"/>}/>
                                                    </div>
                                                    <div className="border-t border-slate-100 my-4 pt-4"></div>
                                                    <InputField label="Username (สำหรับล็อคอิน)" value={userFormData.username} onChange={v => setUserFormData({...userFormData, username: v})} icon={<User size={14} className="text-blue-500"/>}/>
                                                    <InputField label="Password" type="text" value={userFormData.password} onChange={v => setUserFormData({...userFormData, password: v})} icon={<Lock size={14} className="text-blue-500"/>}/>
                                                    <InputField label="สิทธิ์การใช้งาน (Role)" value={userFormData.role} options={["user", "admin"]} onChange={v => setUserFormData({...userFormData, role: v})} icon={<Shield size={14} className="text-blue-500"/>}/>
                                                    
                                                    <button type="submit" className="w-full py-4 bg-blue-600 text-white rounded-xl font-black uppercase shadow-lg mt-6 active:scale-95 transition-all text-[15px]">บันทึกข้อมูลผู้ใช้ขึ้น Cloud</button>
                                                </form>
                                            </div>
                                        </div>
                                    )}
                                </div>

                            ) : view === 'dashboard' ? (
                                <div className="space-y-6 animate-fade-in py-4">
                                    {/* Search Section */}
                                    <div className="relative bg-white rounded-3xl border border-slate-300 p-6 overflow-hidden shadow-sm">
                                        <div className="relative z-10 flex flex-col md:flex-row items-center gap-6">
                                            <div className="flex-1 space-y-4 w-full">
                                                <h2 className="text-[24px] md:text-[28px] font-black text-slate-900 leading-normal uppercase tracking-tight border-l-4 border-blue-600 pl-4">Asset Tracking <br className="md:hidden"/><span className="text-blue-600">รพ.ยางชุมน้อย</span></h2>
                                                <div className="relative w-full max-w-xl">
                                                    <Search className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" size={20} />
                                                    <input type="text" placeholder="ค้นหา รหัส หรือ ชื่อเครื่องมือ..." className="w-full pl-12 pr-4 py-3 bg-slate-50 border border-slate-300 rounded-xl text-[16px] outline-none font-bold focus:border-blue-500 transition-all shadow-inner" value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} />
                                                </div>
                                            </div>
                                            <div className="hidden md:flex items-center justify-center w-28 h-28 bg-blue-50 rounded-2xl border border-blue-100 shrink-0">
                                                <Stethoscope size={50} className="text-blue-500 opacity-60" />
                                            </div>
                                        </div>
                                    </div>

                                    {/* Filter Chips */}
                                    <div className="flex flex-wrap gap-2 pb-2 justify-start md:justify-center px-1">
                                        <button onClick={() => setFilterDept('ทั้งหมด')} className={`px-4 py-2 rounded-full text-[13px] font-bold whitespace-nowrap transition-all border ${filterDept === 'ทั้งหมด' ? 'bg-slate-800 text-white border-slate-800 shadow-md' : 'bg-white text-slate-600 border-slate-300 hover:bg-slate-50'}`}>ทั้งหมด</button>
                                        {DEPARTMENTS.map(d => (
                                            <button key={d} onClick={() => setFilterDept(d)} className={`px-4 py-2 rounded-full text-[13px] font-bold whitespace-nowrap transition-all border ${filterDept === d ? 'bg-slate-800 text-white border-slate-800 shadow-md' : 'bg-white text-slate-600 border-slate-300 hover:bg-slate-50'}`}>{d}</button>
                                        ))}
                                    </div>

                                    {/* Grid List */}
                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                        {filteredAssets.map(asset => (
                                            <div key={asset.docId} className="bg-white rounded-3xl p-6 border border-slate-200 shadow-sm hover:shadow-xl hover:-translate-y-1 hover:border-blue-300 transition-all duration-300 flex flex-col group">
                                                <div className="flex justify-between items-start mb-4 gap-2">
                                                    <span className="text-[11px] font-black text-slate-500 bg-slate-100 border border-slate-200 px-2.5 py-1 rounded-lg tracking-widest uppercase">ID: {asset.id}</span>
                                                    <StatusBadge status={asset.status} />
                                                </div>
                                                <h3 className="text-[20px] font-black text-slate-800 line-clamp-2 mb-3 uppercase leading-normal group-hover:text-blue-600 transition-colors" title={asset.name}>{asset.name}</h3>
                                                <div className="space-y-2 mb-6 flex-1">
                                                    <p className="text-[13px] font-bold text-slate-500 flex items-center gap-2 uppercase"><Building2 size={16} className="text-blue-400 shrink-0"/> {asset.department}</p>
                                                    <p className="text-[13px] font-bold text-slate-500 flex items-center gap-2 uppercase"><Tag size={16} className="text-blue-400 shrink-0"/> <span className="line-clamp-1">{asset.model || "ไม่ระบุรุ่น"}</span></p>
                                                </div>
                                                <div className="flex gap-2 pt-4 border-t border-slate-100 mt-auto">
                                                    <button onClick={() => { setSelectedAsset(asset); setView('profile'); }} className="flex-1 py-2.5 bg-slate-800 text-white text-[13px] font-black rounded-xl border border-slate-800 flex items-center justify-center gap-1 hover:bg-blue-600 hover:border-blue-600 transition-all uppercase tracking-widest shadow-md">ดูรายละเอียด <ChevronRight size={16}/></button>
                                                    <button onClick={() => { setSelectedAsset(asset); setView('sticker'); }} className="p-2.5 bg-white border border-slate-300 text-slate-500 rounded-xl hover:text-blue-600 hover:border-blue-300 transition-all shadow-sm"><Printer size={20}/></button>
                                                </div>
                                            </div>
                                        ))}
                                        {filteredAssets.length === 0 && <div className="col-span-full py-24 text-center border-4 border-dashed border-slate-200 rounded-[3rem] opacity-50 font-black uppercase tracking-widest text-lg text-slate-400">ไม่พบข้อมูลในระบบ</div>}
                                    </div>
                                </div>

                            ) : view === 'profile' && selectedAsset ? (
                                <div className="animate-fade-in py-4">
                                    <button onClick={() => setView('dashboard')} className="mb-6 flex items-center gap-2 font-black text-slate-600 border border-slate-300 bg-white px-5 py-2.5 rounded-xl text-sm uppercase tracking-widest hover:bg-slate-50 transition-all shadow-sm"><ArrowLeft size={18}/> กลับหน้าหลัก</button>
                                    
                                    <div className="bg-white rounded-[3rem] border border-slate-300 overflow-hidden shadow-2xl">
                                        {/* Profile Header */}
                                        <div className="bg-gradient-to-br from-blue-700 to-blue-500 p-8 md:p-12 text-white flex flex-col md:flex-row items-center md:items-start gap-8 relative overflow-hidden">
                                            <div className="absolute top-0 right-0 opacity-5 translate-x-10 -translate-y-10"><Stethoscope size={250}/></div>
                                            <div className="bg-white p-3 rounded-3xl shadow-2xl rotate-3 relative z-10 shrink-0"><QRCodeGenerator value={selectedAsset.id} size={120} /></div>
                                            <div className="text-center md:text-left flex-1 relative z-10">
                                                <div className="flex flex-wrap gap-2 mb-4 items-center justify-center md:justify-start">
                                                    <span className="bg-white/20 backdrop-blur-sm px-3.5 py-1.5 rounded-lg text-[12px] font-black border border-white/30 uppercase tracking-widest shadow-sm">ID: {selectedAsset.id}</span>
                                                    <StatusBadge status={selectedAsset.status} />
                                                </div>
                                                <h2 className="text-3xl md:text-4xl font-black uppercase tracking-tight mb-4 drop-shadow-md leading-normal">{selectedAsset.name}</h2>
                                                <div className="flex flex-wrap justify-center md:justify-start gap-4 text-[14px] opacity-90 font-bold uppercase tracking-widest">
                                                    <span className="flex items-center gap-1.5"><Building2 size={18}/> {selectedAsset.department}</span>
                                                    <span className="flex items-center gap-1.5"><Tag size={18}/> {selectedAsset.model || "ไม่ระบุรุ่น"}</span>
                                                </div>
                                            </div>
                                            {/* แสดงชื่อผู้ลงทะเบียน */}
                                            <div className="hidden md:block absolute bottom-6 right-8 text-right bg-black/20 backdrop-blur-md p-4 rounded-2xl border border-white/20">
                                                <p className="text-[11px] uppercase tracking-widest opacity-70 font-black text-white">ผู้บันทึกข้อมูลล่าสุด</p>
                                                <p className="text-[14px] font-bold mt-1 flex items-center gap-1.5 text-white justify-end"><User size={16}/> {selectedAsset.recordedBy || 'ไม่ระบุ'}</p>
                                            </div>
                                        </div>
                                        
                                        <div className="p-6 md:p-12 space-y-12 md:space-y-16">
                                            {/* ข้อมูลทั่วไป */}
                                            <section>
                                                <h3 className="text-xl font-black text-blue-600 uppercase border-b-4 border-blue-50 pb-3 mb-6 flex items-center gap-2"><FileText size={28}/> ข้อมูลทั่วไป</h3>
                                                <div className="grid grid-cols-2 md:grid-cols-4 gap-6 bg-slate-50 p-6 md:p-8 rounded-[2rem] border border-slate-100">
                                                    {[
                                                        { label: 'Asset ID', val: selectedAsset.id }, { label: 'FSN', val: selectedAsset.fsn },
                                                        { label: 'GF Number', val: selectedAsset.gf }, { label: 'ชื่อเครื่องมือ', val: selectedAsset.name },
                                                        { label: 'ยี่ห้อ/รุ่น/ขนาด', val: selectedAsset.model }, { label: 'Serial No.', val: selectedAsset.serialNo },
                                                        { label: 'ผู้ผลิต/จำหน่าย', val: selectedAsset.vendor }, { label: 'แผนก', val: selectedAsset.department },
                                                        { label: 'วันที่รับเครื่อง', val: formatToThaiDate(selectedAsset.receivedDate) }, { label: 'วันหมดประกัน', val: formatToThaiDate(selectedAsset.warrantyExpire) },
                                                        { label: 'อายุการใช้งาน', val: selectedAsset.lifespan, hl: true }, { label: 'เปลี่ยนแบตล่าสุด', val: formatToThaiDate(selectedAsset.batteryChangeDate) },
                                                    ].map((item, i) => (
                                                        <div key={i}>
                                                            <p className="text-[11px] font-black text-slate-400 uppercase tracking-widest mb-1.5 leading-normal">{item.label}</p>
                                                            <b className={`text-[16px] leading-normal block ${item.hl ? 'text-blue-600 text-xl' : 'text-slate-800'}`}>{item.val || "-"}</b>
                                                        </div>
                                                    ))}
                                                </div>
                                            </section>

                                            {/* ประวัติซ่อม */}
                                            <section>
                                                <div className="flex flex-wrap gap-4 justify-between items-center border-b-4 border-slate-50 pb-3 mb-6">
                                                    <h3 className="text-xl font-black text-slate-800 uppercase flex items-center gap-3"><Wrench className="text-blue-500" size={28}/> ประวัติการซ่อมเครื่อง</h3>
                                                    <button onClick={() => setHistoryModal({ open: true, type: 'repair', data: {} })} className="bg-blue-100 text-blue-600 p-2.5 rounded-xl hover:bg-blue-600 hover:text-white transition-all shadow-sm active:scale-95"><Plus size={24}/></button>
                                                </div>
                                                <div className="space-y-4">
                                                    {(selectedAsset.repairHistory || []).map(h => (
                                                        <div key={h.id} className="bg-white p-5 md:p-6 rounded-2xl border border-slate-200 grid grid-cols-2 md:grid-cols-5 gap-4 text-[14px] shadow-sm relative hover:border-blue-300 transition-colors">
                                                            <div><p className="text-[11px] text-slate-400 font-bold uppercase tracking-widest mb-1">วันที่รับเครื่อง(ซ่อม)</p><b className="block leading-normal">{formatToThaiDate(h.date)}</b></div>
                                                            <div><p className="text-[11px] text-slate-400 font-bold uppercase tracking-widest mb-1">อาการ</p><b className="block leading-normal">{h.symptom || "-"}</b></div>
                                                            <div><p className="text-[11px] text-slate-400 font-bold uppercase tracking-widest mb-1">วิธีแก้ไข</p><b className="block leading-normal">{h.fix || "-"}</b></div>
                                                            <div><p className="text-[11px] text-slate-400 font-bold uppercase tracking-widest mb-1">สรุป</p><b className="text-blue-600 block leading-normal">{h.summary || "-"}</b></div>
                                                            <div><p className="text-[11px] text-slate-400 font-bold uppercase tracking-widest mb-1">ผู้บันทึก</p><b className="text-slate-500 text-[12px] bg-slate-100 px-2 py-1.5 rounded-md inline-block leading-normal">{h.recordedBy || "-"}</b></div>
                                                        </div>
                                                    ))}
                                                    {(!selectedAsset.repairHistory || selectedAsset.repairHistory.length === 0) && <p className="text-center py-10 text-slate-300 font-bold italic text-[14px] tracking-widest bg-slate-50 rounded-2xl border border-dashed border-slate-200 uppercase">ไม่มีข้อมูลประวัติซ่อม</p>}
                                                </div>
                                            </section>

                                            {/* ประวัติ CAL */}
                                            <section>
                                                <div className="flex flex-wrap gap-4 justify-between items-center border-b-4 border-slate-50 pb-3 mb-6">
                                                    <h3 className="text-xl font-black text-slate-800 uppercase flex items-center gap-3"><Activity className="text-emerald-500" size={28}/> ประวัติการ Calibrate</h3>
                                                    <button onClick={() => setHistoryModal({ open: true, type: 'cal', data: {} })} className="bg-emerald-100 text-emerald-600 p-2.5 rounded-xl hover:bg-emerald-600 hover:text-white transition-all shadow-sm active:scale-95"><Plus size={24}/></button>
                                                </div>
                                                <div className="space-y-4">
                                                    {(selectedAsset.calHistory || []).map(h => (
                                                        <div key={h.id} className="bg-emerald-50/30 p-5 md:p-6 rounded-2xl border border-emerald-100 grid grid-cols-2 md:grid-cols-5 gap-4 text-[14px] shadow-sm hover:border-emerald-300 transition-colors">
                                                            <div><p className="text-[11px] text-emerald-600 font-bold uppercase tracking-widest mb-1">CAL Date</p><b className="text-slate-800 block leading-normal">{formatToThaiDate(h.date)}</b></div>
                                                            <div><p className="text-[11px] text-emerald-600 font-bold uppercase tracking-widest mb-1">ผลการ CAL</p><b className="text-slate-800 block leading-normal">{h.result || "-"}</b></div>
                                                            <div><p className="text-[11px] text-emerald-600 font-bold uppercase tracking-widest mb-1">ผู้ดำเนินการ</p><b className="text-slate-800 block leading-normal">{h.by || "-"}</b></div>
                                                            <div><p className="text-[11px] text-rose-500 font-bold uppercase tracking-widest mb-1">Due Date</p><b className="text-rose-600 block leading-normal">{formatToThaiDate(h.due)}</b></div>
                                                            <div><p className="text-[11px] text-emerald-600 font-bold uppercase tracking-widest mb-1">ผู้บันทึก</p><b className="text-slate-500 text-[12px] bg-white px-2 py-1.5 rounded-md inline-block leading-normal">{h.recordedBy || "-"}</b></div>
                                                        </div>
                                                    ))}
                                                    {(!selectedAsset.calHistory || selectedAsset.calHistory.length === 0) && <p className="text-center py-10 text-slate-300 font-bold italic text-[14px] tracking-widest bg-slate-50 rounded-2xl border border-dashed border-slate-200 uppercase">ไม่มีข้อมูลประวัติสอบเทียบ</p>}
                                                </div>
                                            </section>

                                            {/* ประวัติยืมคืน */}
                                            <section>
                                                <div className="flex flex-wrap gap-4 justify-between items-center border-b-4 border-slate-50 pb-3 mb-6">
                                                    <h3 className="text-xl font-black text-slate-800 uppercase flex items-center gap-3"><ArrowLeftRight className="text-orange-500" size={28}/> ประวัติการยืม-คืน</h3>
                                                    <button onClick={() => setHistoryModal({ open: true, type: 'loan', data: {} })} className="bg-orange-100 text-orange-600 p-2.5 rounded-xl hover:bg-orange-600 hover:text-white transition-all shadow-sm active:scale-95"><Plus size={24}/></button>
                                                </div>
                                                <div className="space-y-4">
                                                    {(selectedAsset.loanHistory || []).map(h => (
                                                        <div key={h.id} className="bg-orange-50/30 p-5 md:p-6 rounded-2xl border border-orange-100 grid grid-cols-2 md:grid-cols-6 gap-4 text-[14px] items-center shadow-sm hover:border-orange-300 transition-colors">
                                                            <div><p className="text-[11px] text-orange-600 font-bold uppercase tracking-widest mb-1">วันที่ยืม</p><b className="text-slate-800 block leading-normal">{formatToThaiDate(h.date)}</b></div>
                                                            <div><p className="text-[11px] text-orange-600 font-bold uppercase tracking-widest mb-1">เครื่องที่ยืม</p><b className="text-slate-800 block leading-normal">{h.item || "-"}</b></div>
                                                            <div><p className="text-[11px] text-orange-600 font-bold uppercase tracking-widest mb-1">จำนวน</p><b className="text-slate-800 block leading-normal">{h.amount || "-"}</b></div>
                                                            <div><p className="text-[11px] text-orange-600 font-bold uppercase tracking-widest mb-1">ผู้ยืม/หน่วยงาน</p><b className="text-slate-800 block leading-normal">{h.name || "-"}</b></div>
                                                            <div>
                                                                <p className="text-[11px] text-orange-600 font-bold uppercase tracking-widest mb-1">สถานะ</p>
                                                                <span className={`px-3 py-1.5 rounded-lg text-[11px] font-black uppercase tracking-widest inline-block leading-normal ${h.status === 'คืนแล้ว' ? 'bg-emerald-500 text-white' : 'bg-rose-500 text-white shadow-sm shadow-rose-200'}`}>{h.status || "ยังไม่คืน"}</span>
                                                            </div>
                                                            <div><p className="text-[11px] text-orange-600 font-bold uppercase tracking-widest mb-1">ผู้บันทึก</p><b className="text-slate-500 text-[12px] bg-white px-2 py-1.5 rounded-md inline-block leading-normal">{h.recordedBy || "-"}</b></div>
                                                        </div>
                                                    ))}
                                                    {(!selectedAsset.loanHistory || selectedAsset.loanHistory.length === 0) && <p className="text-center py-10 text-slate-300 font-bold italic text-[14px] tracking-widest bg-slate-50 rounded-2xl border border-dashed border-slate-200 uppercase">ไม่มีข้อมูลประวัติยืมคืน</p>}
                                                </div>
                                            </section>
                                        </div>
                                        
                                        {/* ลบข้อมูล Asset (Admin Only) */}
                                        {currentUserData.role === 'admin' && (
                                            <div className="p-8 border-t border-slate-100 bg-slate-50 text-right">
                                                <button onClick={() => handleDeleteAsset(selectedAsset.docId)} className="text-rose-500 text-[14px] font-black uppercase hover:underline tracking-widest flex items-center gap-2 justify-end w-full">
                                                    <Trash2 size={18}/> ลบข้อมูลเครื่องมือนี้ออกจากระบบ Cloud ถาวร
                                                </button>
                                            </div>
                                        )}
                                    </div>
                                </div>

                            ) : view === 'sticker' && selectedAsset ? (
                                <div className="flex flex-col items-center justify-center p-6 md:p-10 min-h-[70vh] animate-fade-in">
                                    <div className="bg-white p-4 border border-slate-400 w-full max-w-[420px] flex font-sans text-slate-900 shadow-xl rounded-xl mb-10 sticker-print-area transform md:scale-110">
                                        <div className="w-[110px] flex flex-col items-center justify-center pr-3 border-r border-slate-300 shrink-0">
                                            <QRCodeGenerator value={selectedAsset.id} size={100} />
                                        </div>
                                        <div className="flex-1 pl-4 flex flex-col justify-between py-0.5 text-left">
                                            <div className="font-black text-[16px] leading-normal mb-1 uppercase text-black">{selectedAsset.name}</div>
                                            <div className="text-[14px] leading-normal mb-1 font-bold text-slate-700">{selectedAsset.department}</div>
                                            <div className="text-[11px] leading-normal mb-1 font-bold text-slate-500 uppercase tracking-widest">GF: {selectedAsset.gf || "-"}</div>
                                            <div className="flex justify-between items-end text-[12px] font-black">
                                                <div className="truncate pr-2 uppercase text-slate-400 font-medium">FSN: {selectedAsset.fsn || "-"}</div>
                                                <div className="whitespace-nowrap font-black text-blue-600 text-[15px]">ID: {selectedAsset.id}</div>
                                            </div>
                                            <div className="text-[10px] font-black border-t border-slate-200 pt-2 mt-2 uppercase text-slate-500 leading-normal">
                                                รับ: {formatToThaiDate(selectedAsset.receivedDate)} | ประกัน: {formatToThaiDate(selectedAsset.warrantyExpire)}
                                            </div>
                                        </div>
                                    </div>
                                    <div className="flex flex-wrap justify-center gap-4 no-print w-full">
                                        <button onClick={() => window.print()} className="bg-slate-900 text-white px-8 py-3.5 rounded-2xl font-black uppercase tracking-widest flex items-center justify-center gap-2 hover:bg-black shadow-xl transition-all active:scale-95 w-full md:w-auto"><Printer size={20}/> พิมพ์สติกเกอร์</button>
                                        <button onClick={() => setView('dashboard')} className="bg-white border border-slate-300 text-slate-600 px-8 py-3.5 rounded-2xl font-black hover:bg-slate-50 transition-all uppercase tracking-widest active:scale-95 w-full md:w-auto text-center">ย้อนกลับ</button>
                                    </div>
                                </div>
                            ) : null}
                        </div>

                        {/* =========================================
                            Modal: ลงทะเบียนเครื่องมือใหม่ (TABBED VERSION)
                            ========================================= */}
                        {isAddModalOpen && (
                            <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-[150] flex items-center justify-center p-4 md:p-6">
                                <div className="bg-white w-full max-w-5xl rounded-[2.5rem] shadow-2xl border border-slate-300 overflow-hidden flex flex-col max-h-[90vh] animate-fade-in relative z-10">
                                    
                                    {/* Modal Header */}
                                    <div className="bg-blue-600 p-6 flex justify-between items-center text-white shrink-0">
                                        <h2 className="text-xl font-black uppercase tracking-widest flex items-center gap-3"><PlusCircle size={26} /> ลงทะเบียนเครื่องมือใหม่</h2>
                                        <button type="button" onClick={() => setIsAddModalOpen(false)} className="hover:rotate-90 transition-all bg-white/20 p-2 rounded-full"><X size={20}/></button>
                                    </div>

                                    {/* Tabs Header */}
                                    <div className="flex bg-slate-100 px-4 md:px-6 pt-4 gap-2 border-b border-slate-200 shrink-0 overflow-x-auto no-scrollbar">
                                        {[
                                            { id: 'general', label: '1. ข้อมูลทั่วไป', icon: <FileText size={16}/> },
                                            { id: 'repair', label: '2. ประวัติซ่อม', icon: <Wrench size={16}/> },
                                            { id: 'cal', label: '3. ประวัติ CAL', icon: <Activity size={16}/> },
                                            { id: 'loan', label: '4. ยืม-คืน', icon: <ArrowLeftRight size={16}/> }
                                        ].map(tab => (
                                            <button key={tab.id} type="button" onClick={() => setAddModalTab(tab.id)} 
                                                className={`flex items-center gap-2 px-4 md:px-6 py-3.5 text-[13px] md:text-[14px] font-black uppercase transition-all rounded-t-2xl border-x border-t whitespace-nowrap
                                                ${addModalTab === tab.id ? 'bg-white border-slate-200 text-blue-600 shadow-[0_4px_0_0_#fff]' : 'border-transparent text-slate-400 hover:text-slate-700 hover:bg-slate-200'}`}>
                                                {tab.icon} {tab.label}
                                            </button>
                                        ))}
                                    </div>

                                    {/* Modal Form Content */}
                                    <form onSubmit={handleAddAsset} className="flex flex-col flex-1 overflow-hidden bg-white">
                                        <div className="p-6 md:p-10 overflow-y-auto flex-1 no-scrollbar">
                                            
                                            {/* Tab 1: ข้อมูลทั่วไป */}
                                            {addModalTab === 'general' && (
                                                <div className="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-5 animate-fade-in">
                                                    <InputField label="FSN" value={assetFormData.fsn} onChange={v => setAssetFormData({...assetFormData, fsn: v})} icon={<FileText size={16} className="text-blue-500"/>} />
                                                    <InputField label="ID (รหัสทรัพย์สิน) *" value={assetFormData.id} onChange={v => setAssetFormData({...assetFormData, id: v})} icon={<Hash size={16} className="text-blue-500"/>} />
                                                    <InputField label="GF Number" value={assetFormData.gf} onChange={v => setAssetFormData({...assetFormData, gf: v})} icon={<Settings size={16} className="text-blue-500"/>} />
                                                    <InputField label="ชื่อเครื่องมือแพทย์ *" value={assetFormData.name} onChange={v => setAssetFormData({...assetFormData, name: v})} icon={<Tag size={16} className="text-blue-500"/>} />
                                                    <InputField label="ยี่ห้อ/รุ่น/ขนาด" value={assetFormData.model} onChange={v => setAssetFormData({...assetFormData, model: v})} icon={<Box size={16} className="text-blue-500"/>} />
                                                    <InputField label="Serial No." value={assetFormData.serialNo} onChange={v => setAssetFormData({...assetFormData, serialNo: v})} icon={<Hash size={16} className="text-blue-500"/>} />
                                                    <InputField label="ผู้ผลิต/ผู้จำหน่าย" value={assetFormData.vendor} onChange={v => setAssetFormData({...assetFormData, vendor: v})} icon={<Building2 size={16} className="text-blue-500"/>} />
                                                    <InputField label="แผนกที่รับผิดชอบ" value={assetFormData.department} options={DEPARTMENTS} onChange={v => setAssetFormData({...assetFormData, department: v})} icon={<MapPin size={16} className="text-blue-500"/>} />
                                                    <InputField label="สถานะปัจจุบัน" value={assetFormData.status} options={STATUS_OPTIONS} onChange={v => setAssetFormData({...assetFormData, status: v})} icon={<Activity size={16} className="text-blue-500"/>} />
                                                    
                                                    <div className="col-span-1 md:col-span-2 border-t border-slate-100 my-2 pt-4"></div>

                                                    <InputField label="วันที่รับเครื่อง" type="date" value={assetFormData.receivedDate} onChange={v => setAssetFormData({...assetFormData, receivedDate: v})} icon={<Calendar size={16} className="text-emerald-500"/>} />
                                                    <InputField label="วันหมดประกัน" type="date" value={assetFormData.warrantyExpire} onChange={v => setAssetFormData({...assetFormData, warrantyExpire: v})} icon={<ShieldCheck size={16} className="text-emerald-500"/>} />
                                                    <InputField label="อายุการใช้งาน (คำนวณอัตโนมัติ)" value={assetFormData.lifespan} onChange={v => setAssetFormData({...assetFormData, lifespan: v})} icon={<Clock size={16} className="text-emerald-500"/>} />
                                                    <InputField label="วันเปลี่ยนแบตเตอรี่ล่าสุด" type="date" value={assetFormData.batteryChangeDate} onChange={v => setAssetFormData({...assetFormData, batteryChangeDate: v})} icon={<Battery size={16} className="text-emerald-500"/>} />
                                                </div>
                                            )}

                                            {/* Tab 2: ประวัติการซ่อม */}
                                            {addModalTab === 'repair' && (
                                                <div className="space-y-5 animate-fade-in max-w-2xl mx-auto">
                                                    <div className="bg-blue-50 p-6 rounded-2xl mb-6 border border-blue-100 flex gap-4 items-center"><Info className="text-blue-600 shrink-0" size={32}/> <p className="text-[14px] font-bold text-blue-900 leading-normal">เพิ่มประวัติการซ่อมเริ่มต้น<br/><span className="font-medium text-blue-700">หากเป็นเครื่องมือใหม่ที่ยังไม่เคยซ่อม สามารถข้ามแท็บนี้ได้เลย</span></p></div>
                                                    <InputField label="วันที่รับเครื่อง (ซ่อม)" type="date" value={assetFormData.repairDate} onChange={v => setAssetFormData({...assetFormData, repairDate: v})} icon={<Calendar size={16} className="text-blue-500"/>} />
                                                    <InputField label="อาการ" value={assetFormData.repairSymptom} onChange={v => setAssetFormData({...assetFormData, repairSymptom: v})} icon={<AlertCircle size={16} className="text-blue-500"/>} />
                                                    <InputField label="สรุป" value={assetFormData.repairSummary} onChange={v => setAssetFormData({...assetFormData, repairSummary: v})} icon={<ClipboardList size={16} className="text-blue-500"/>} />
                                                    <InputField label="วิธีการแก้ไข" value={assetFormData.repairFix} onChange={v => setAssetFormData({...assetFormData, repairFix: v})} icon={<Wrench size={16} className="text-blue-500"/>} />
                                                </div>
                                            )}

                                            {/* Tab 3: ประวัติการ CAL */}
                                            {addModalTab === 'cal' && (
                                                <div className="space-y-5 animate-fade-in max-w-2xl mx-auto">
                                                    <div className="bg-emerald-50 p-6 rounded-2xl mb-6 border border-emerald-100 flex gap-4 items-center"><Info className="text-emerald-600 shrink-0" size={32}/> <p className="text-[14px] font-bold text-emerald-900 leading-normal">เพิ่มประวัติสอบเทียบครั้งแรก<br/><span className="font-medium text-emerald-700">หรือเว้นว่างไว้หากเครื่องนี้ยังไม่เคยผ่านการสอบเทียบ (Calibrate)</span></p></div>
