                                                    <InputField label="CAL date" type="date" value={assetFormData.calDate} onChange={v => setAssetFormData({...assetFormData, calDate: v})} icon={<Calendar size={16} className="text-emerald-500"/>} />
                                                    <InputField label="ผลการ CAL" value={assetFormData.calResult} onChange={v => setAssetFormData({...assetFormData, calResult: v})} icon={<CircleCheck size={16} className="text-emerald-500"/>} />
                                                    <InputField label="ผู้ดำเนินการ" value={assetFormData.calBy} onChange={v => setAssetFormData({...assetFormData, calBy: v})} icon={<User size={16} className="text-emerald-500"/>} />
                                                    <InputField label="Due Date (ครั้งต่อไป)" type="date" value={assetFormData.calDue} onChange={v => setAssetFormData({...assetFormData, calDue: v})} icon={<CalendarClock size={16} className="text-emerald-500"/>} />
                                                </div>
                                            )}

                                            {/* Tab 4: ยืม-คืน */}
                                            {addModalTab === 'loan' && (
                                                <div className="space-y-5 animate-fade-in max-w-2xl mx-auto">
                                                    <div className="bg-orange-50 p-6 rounded-2xl mb-6 border border-orange-100 flex gap-4 items-center"><Info className="text-orange-600 shrink-0" size={32}/> <p className="text-[14px] font-bold text-orange-900 leading-normal">เพิ่มสถานะการถูกยืมปัจจุบัน<br/><span className="font-medium text-orange-700">หากเครื่องนี้อยู่ที่แผนกตามปกติ ไม่ได้ถูกยืม ให้เว้นว่างไว้</span></p></div>
                                                    <InputField label="วันที่ยืม" type="date" value={assetFormData.loanDate} onChange={v => setAssetFormData({...assetFormData, loanDate: v})} icon={<Calendar size={16} className="text-orange-500"/>} />
                                                    <InputField label="เครื่องที่ยืม" value={assetFormData.loanItem} onChange={v => setAssetFormData({...assetFormData, loanItem: v})} icon={<Tag size={16} className="text-orange-500"/>} />
                                                    <InputField label="จำนวน" type="number" value={assetFormData.loanAmount} onChange={v => setAssetFormData({...assetFormData, loanAmount: v})} icon={<Hash size={16} className="text-orange-500"/>} />
                                                    <InputField label="ผู้ที่ยืม/หน่วยงาน" value={assetFormData.loanPerson} onChange={v => setAssetFormData({...assetFormData, loanPerson: v})} icon={<Users size={16} className="text-orange-500"/>} />
                                                    <InputField label="สถานะ" options={["ยังไม่คืน", "คืนแล้ว"]} value={assetFormData.loanStatus} onChange={v => setAssetFormData({...assetFormData, loanStatus: v})} icon={<ArrowLeftRight size={16} className="text-orange-500"/>} />
                                                </div>
                                            )}
                                        </div>
                                        
                                        {/* Submit Footer */}
                                        <div className="p-6 md:p-8 bg-slate-50 border-t border-slate-200 flex flex-wrap md:flex-nowrap gap-4 shrink-0">
                                            <button type="button" onClick={() => setIsAddModalOpen(false)} className="w-full md:w-auto md:flex-1 py-4 font-black text-slate-500 uppercase text-[14px] tracking-widest hover:bg-slate-200 rounded-2xl transition-all border border-slate-300 bg-white">ยกเลิก</button>
                                            <button type="submit" className="w-full md:w-auto md:flex-[2] py-4 bg-blue-600 text-white rounded-2xl font-black uppercase text-[15px] tracking-widest shadow-xl shadow-blue-200 hover:bg-blue-700 active:scale-95 transition-all flex justify-center items-center gap-2">
                                                <Save size={20} /> บันทึกข้อมูลขึ้น Cloud
                                            </button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        )}

                        {/* =========================================
                            Modal: สำหรับเพิ่มประวัติภายหลัง (ในหน้า Profile) 
                            ========================================= */}
                        {historyModal.open && (
                            <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-[200] flex items-center justify-center p-4">
                                <div className="bg-white w-full max-w-lg rounded-[2.5rem] p-8 shadow-2xl border border-slate-300 animate-fade-in overflow-hidden relative z-10">
                                    <div className={`absolute top-0 left-0 w-full h-2 ${historyModal.type === 'repair' ? 'bg-blue-500' : historyModal.type === 'cal' ? 'bg-emerald-500' : 'bg-orange-500'}`}></div>
                                    <h2 className="text-xl font-black uppercase mb-6 flex justify-between items-center text-slate-800">
                                        <span className="flex items-center gap-2">
                                            {historyModal.type === 'repair' ? <Wrench className="text-blue-600"/> : historyModal.type === 'cal' ? <Activity className="text-emerald-600"/> : <ArrowLeftRight className="text-orange-600"/>}
                                            เพิ่มข้อมูล{historyModal.type === 'repair' ? 'การซ่อม' : historyModal.type === 'cal' ? 'การสอบเทียบ' : 'การยืม-คืน'}
                                        </span>
                                        <button type="button" onClick={() => setHistoryModal({ open: false, type: '', data: {} })} className="text-slate-400 hover:text-slate-800"><X size={24}/></button>
                                    </h2>
                                    <form onSubmit={handleAddHistory} className="space-y-4">
                                        {historyModal.type === 'repair' && (
                                            <>
                                                <InputField label="วันที่รับเครื่อง(ซ่อม)" type="date" icon={<Calendar size={14} className="text-blue-500"/>} onChange={v => setHistoryModal({...historyModal, data: {...historyModal.data, date: v}})} />
                                                <InputField label="อาการ" icon={<AlertCircle size={14} className="text-blue-500"/>} onChange={v => setHistoryModal({...historyModal, data: {...historyModal.data, symptom: v}})} />
                                                <InputField label="สรุป" icon={<ClipboardList size={14} className="text-blue-500"/>} onChange={v => setHistoryModal({...historyModal, data: {...historyModal.data, summary: v}})} />
                                                <InputField label="วิธีการแก้ไข" icon={<Wrench size={14} className="text-blue-500"/>} onChange={v => setHistoryModal({...historyModal, data: {...historyModal.data, fix: v}})} />
                                            </>
                                        )}
                                        {historyModal.type === 'cal' && (
                                            <>
                                                <InputField label="CAL Date" type="date" icon={<Calendar size={14} className="text-emerald-500"/>} onChange={v => setHistoryModal({...historyModal, data: {...historyModal.data, date: v}})} />
                                                <InputField label="ผลการ CAL" icon={<CircleCheck size={14} className="text-emerald-500"/>} onChange={v => setHistoryModal({...historyModal, data: {...historyModal.data, result: v}})} />
                                                <InputField label="ผู้ดำเนินการ" icon={<User size={14} className="text-emerald-500"/>} onChange={v => setHistoryModal({...historyModal, data: {...historyModal.data, by: v}})} />
                                                <InputField label="Due Date" type="date" icon={<CalendarClock size={14} className="text-emerald-500"/>} onChange={v => setHistoryModal({...historyModal, data: {...historyModal.data, due: v}})} />
                                            </>
                                        )}
                                        {historyModal.type === 'loan' && (
                                            <>
                                                <InputField label="วันที่ยืม" type="date" icon={<Calendar size={14} className="text-orange-500"/>} onChange={v => setHistoryModal({...historyModal, data: {...historyModal.data, date: v}})} />
                                                <InputField label="เครื่องที่ยืม" icon={<Tag size={14} className="text-orange-500"/>} onChange={v => setHistoryModal({...historyModal, data: {...historyModal.data, item: v}})} />
                                                <InputField label="จำนวน" type="number" icon={<Hash size={14} className="text-orange-500"/>} onChange={v => setHistoryModal({...historyModal, data: {...historyModal.data, amount: v}})} />
                                                <InputField label="ผู้ที่ยืม/หน่วยงาน" icon={<Users size={14} className="text-orange-500"/>} onChange={v => setHistoryModal({...historyModal, data: {...historyModal.data, name: v}})} />
                                                <InputField label="สถานะ" options={["ยังไม่คืน", "คืนแล้ว"]} icon={<ArrowLeftRight size={14} className="text-orange-500"/>} onChange={v => setHistoryModal({...historyModal, data: {...historyModal.data, status: v}})} />
                                            </>
                                        )}
                                        <button className={`w-full py-4 text-white rounded-2xl font-black uppercase mt-8 shadow-xl transition-all active:scale-95 flex items-center justify-center gap-2 text-[15px] ${historyModal.type === 'repair' ? 'bg-blue-600 shadow-blue-200 hover:bg-blue-700' : historyModal.type === 'cal' ? 'bg-emerald-600 shadow-emerald-200 hover:bg-emerald-700' : 'bg-orange-600 shadow-orange-200 hover:bg-orange-700'}`}>
                                            <Save size={20} /> อัปเดตประวัติขึ้น Cloud
                                        </button>
                                    </form>
                                </div>
                            </div>
                        )}
                    </div>
                );
            };

            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<App />);
        })();
    </script>
</body>
</html>
