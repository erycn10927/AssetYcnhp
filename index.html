<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบทะเบียนเครื่องมือแพทย์ (Sticker 100x37.5mm Optimized)</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        body { 
            font-family: 'Sarabun', sans-serif; 
            background-color: #f1f5f9; 
            color: #1e293b; 
            font-size: 15px; 
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .animate-fade-in { animation: fadeIn 0.2s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        input[type="date"]::-webkit-inner-spin-button, 
        input[type="date"]::-webkit-calendar-picker-indicator { opacity: 0.5; cursor: pointer; }

        input, select, textarea { font-size: 15px !important; }

        @media print { 
            @page { size: 100mm 37.5mm; margin: 0; }
            body, html { width: 100mm; height: 37.5mm; background: white; margin: 0; padding: 0; overflow: hidden; }
            .no-print { display: none !important; } 
            body * { visibility: hidden; }
            
            #sticker-to-print, #sticker-to-print * { visibility: visible; }
            #sticker-to-print { 
                position: absolute !important; 
                left: 0 !important; 
                top: 0 !important; 
                width: 100mm !important;
                height: 37.5mm !important;
                margin: 0 !important; 
                box-shadow: none !important; 
                border: none !important; 
                border-radius: 0 !important;
                display: flex !important;
                page-break-inside: avoid;
                background-color: white !important;
                color: black !important;
                box-sizing: border-box;
                padding: 0 !important;
            } 
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-presets="react">
        (function() {
            const { useState, useEffect, useRef, useMemo } = React;

            const GAS_URL = "https://script.google.com/macros/s/AKfycbz9L-vcZ_7MrT2ir7_bA1imKovYLcYwyg9xtftnFpS32qNwZDFamByphwlVkCh5Pkfj/exec"; 
            
            const Icon = ({ name, size = 16, className = "" }) => {
                const spanRef = useRef(null);
                useEffect(() => {
                    if (window.lucide && spanRef.current) {
                        spanRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
                        window.lucide.createIcons({ root: spanRef.current });
                        const svg = spanRef.current.querySelector('svg');
                        if (svg) {
                            svg.setAttribute('width', size);
                            svg.setAttribute('height', size);
                            if (className) {
                                className.split(' ').forEach(c => svg.classList.add(c));
                            }
                        }
                    }
                }, [name, size, className]);
                return <span ref={spanRef} className="inline-flex items-center justify-center leading-none"></span>;
            };

            const DEPARTMENTS = ["ER", "IPD", "LR", "OPD", "NCD", "PCU", "LAB", "ห้องยา", "ทันตกรรม", "งานคร.", "กายภาพ", "แผนไทย", "IT", "ส่วนกลาง"];
            const STATUS_OPTIONS = ["ใช้งานปกติ", "อยู่ในระยะ CAL", "แบตหมดอายุ", "ส่งซ่อม", "ไม่พร้อมใช้งาน"];

            const formatToThaiDate = (dateString) => {
                if (!dateString || dateString === "-") return "-";
                const date = new Date(dateString);
                if (isNaN(date.getTime())) return dateString;
                return `${String(date.getDate()).padStart(2, '0')}-${String(date.getMonth() + 1).padStart(2, '0')}-${date.getFullYear() + 543}`;
            };

            const calculateLifespan = (receivedDate) => {
                if (!receivedDate || receivedDate === "-") return "-";
                const start = new Date(receivedDate);
                const now = new Date();
                if (start > now) return "0 ปี 0 เดือน";
                let years = now.getFullYear() - start.getFullYear();
                let months = now.getMonth() - start.getMonth();
                if (months < 0) { years--; months += 12; }
                return `${years} ปี ${months} เดือน`;
            };

            const isWarrantyExpired = (dateStr) => {
                if (!dateStr || dateStr === "-") return false;
                const d = new Date(dateStr);
                d.setHours(23, 59, 59, 999);
                return !isNaN(d.getTime()) && new Date() > d;
            };

            const StatusBadge = ({ status }) => {
                const config = { "ใช้งานปกติ": "bg-emerald-500 text-white", "อยู่ในระยะ CAL": "bg-blue-600 text-white", "แบตหมดอายุ": "bg-orange-500 text-white", "ส่งซ่อม": "bg-amber-400 text-slate-800", "ไม่พร้อมใช้งาน": "bg-rose-600 text-white" }[status] || "bg-slate-500 text-white";
                return (
                    <div className={`${config} px-2 py-0.5 rounded-lg border border-slate-400/20 flex items-center gap-1 shadow-sm`}>
                        <span className="w-1.5 h-1.5 rounded-full bg-white animate-pulse"></span>
                        <span className="text-[11px] font-bold uppercase tracking-tight leading-none">{status}</span>
                    </div>
                );
            };

            const InputField = ({ label, value, onChange, placeholder, type = "text", options = null, icon, disabled = false, required = false }) => (
                <div className="flex flex-col gap-0.5 w-full">
                    <label className="text-[12px] font-bold text-slate-600 flex items-center gap-1 uppercase ml-0.5">
                        {icon} {label} {required && <span className="text-rose-500">*</span>}
                    </label>
                    {options ? (
                        <select disabled={disabled} className="w-full px-2 py-1.5 bg-slate-50 border border-slate-200 rounded-lg focus:border-blue-500 focus:bg-white outline-none transition text-[14px] font-medium disabled:opacity-60" value={value || ''} onChange={e => onChange(e.target.value)}>
                            <option value="">เลือก{label}</option>
                            {options.map(opt => <option key={opt} value={opt}>{opt}</option>)}
                        </select>
                    ) : (
                        <input type={type} disabled={disabled} placeholder={placeholder || '...'} className="w-full px-2 py-1.5 bg-slate-50 border border-slate-200 rounded-lg focus:border-blue-500 focus:bg-white outline-none transition text-[14px] font-medium disabled:opacity-60" value={value || ''} onChange={e => onChange(e.target.value)} />
                    )}
                </div>
            );

            const LoginView = ({ onLogin, error, loading }) => {
                const [form, setForm] = useState({ username: '', password: '' });
                const handleUsernameChange = (v) => setForm({...form, username: v.replace(/[^a-zA-Z0-9@._-]/g, '')});

                return (
                    <div className="min-h-screen flex items-center justify-center bg-slate-200 p-6 animate-fade-in">
                        <div className="w-full max-w-xs bg-white rounded-[2.5rem] shadow-[0_20px_50px_rgba(0,0,0,0.15)] overflow-hidden flex flex-col border border-slate-300">
                            <div className="bg-blue-600 p-10 text-white text-center relative">
                                <div className="bg-white/20 p-4 rounded-full w-max mx-auto mb-4 border border-white/30">
                                    <Icon name="stethoscope" size={40} className="text-white" />
                                </div>
                                <h1 className="text-xl font-black uppercase mb-1 leading-tight tracking-tight">ระบบทะเบียนเครื่องมือแพทย์</h1>
                                <div className="text-[11px] font-bold opacity-90 uppercase tracking-[0.2em] mt-3 bg-white/10 py-1 rounded-full border border-white/10">โรงพยาบาลยางชุมน้อย</div>
                            </div>
                            <form onSubmit={(e) => onLogin(e, form)} className="p-8 space-y-5 bg-white">
                                {error && (
                                    <div className="p-3 bg-rose-50 border border-rose-200 text-rose-600 text-[12px] font-bold rounded-xl text-center leading-tight">
                                        {error}
                                    </div>
                                )}
                                <InputField 
                                    label="ชื่อผู้ใช้" 
                                    placeholder="Username"
                                    icon={<Icon name="user" size={14} className="text-blue-500"/>} 
                                    value={form.username} 
                                    onChange={handleUsernameChange} 
                                />
                                <InputField 
                                    label="รหัสผ่าน" 
                                    type="password" 
                                    placeholder="Password"
                                    icon={<Icon name="lock" size={14} className="text-blue-500"/>} 
                                    value={form.password} 
                                    onChange={v => setForm({...form, password: v})} 
                                />
                                <button 
                                    disabled={loading} 
                                    className="w-full py-3.5 bg-blue-600 text-white rounded-2xl font-black uppercase shadow-xl hover:bg-blue-700 active:scale-95 transition-all flex items-center justify-center gap-2 text-sm mt-4 border-b-4 border-blue-800"
                                >
                                    {loading ? <Icon name="loader-2" className="animate-spin" /> : "เข้าสู่ระบบ"}
                                </button>
                                <p className="text-center text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-4">Cloud Database System v2.5</p>
                            </form>
                        </div>
                    </div>
                );
            };

            const App = () => {
                const [assets, setAssets] = useState([]);
                const [users, setUsers] = useState([]);
                const [currentUserData, setCurrentUserData] = useState(null);
                const [loading, setLoading] = useState(false);
                const [view, setView] = useState('dashboard');
                const [searchQuery, setSearchQuery] = useState('');
                const [filterDept, setFilterDept] = useState('ทั้งหมด');
                const [isAddModalOpen, setIsAddModalOpen] = useState(false);
                const [isEditAssetMode, setIsEditAssetMode] = useState(false); 
                const [selectedAsset, setSelectedAsset] = useState(null);
                const [historyModal, setHistoryModal] = useState({ open: false, type: '', data: {}, isEdit: false }); 
                const [isUserModalOpen, setIsUserModalOpen] = useState(false);
                const [isEditUserMode, setIsEditUserMode] = useState(false);
                const [userFormData, setUserFormData] = useState({ username: '', password: '', name: '', surname: '', position: '', department: 'ER', role: 'user' });
                const [loginError, setLoginError] = useState("");
                const [viewImageModal, setViewImageModal] = useState(null);

                const initialFormState = { 
                    id: '', name: '', model: '', serialNo: '', manufacturer: '', vendor: '', technicianPhone: '', department: 'ER',
                    receivedDate: '', warrantyExpire: '', lifespan: '', batteryChangeDate: '', status: 'ใช้งานปกติ'
                };
                const [assetFormData, setAssetFormData] = useState(initialFormState);

                // สถิติสำหรับ Dashboard
                const stats = useMemo(() => {
                    return {
                        total: assets.length,
                        notReady: assets.filter(a => a.status === 'ไม่พร้อมใช้งาน').length,
                        repairing: assets.filter(a => a.status === 'ส่งซ่อม').length,
                        warrantyExpired: assets.filter(a => isWarrantyExpired(a.warrantyExpire)).length
                    };
                }, [assets]);

                useEffect(() => { 
                    if (assetFormData.receivedDate) {
                        setAssetFormData(prev => ({ ...prev, lifespan: calculateLifespan(prev.receivedDate) })); 
                    }
                }, [assetFormData.receivedDate]);

                const fetchDatabase = async () => {
                    setLoading(true);
                    try {
                        const response = await fetch(GAS_URL, { redirect: "follow" });
                        const result = await response.json();
                        setAssets(result.assets || []);
                        setUsers(result.users || []);
                        return result;
                    } catch (e) {
                        return { status: "error", message: "ไม่สามารถเชื่อมต่อฐานข้อมูลได้" };
                    } finally { setLoading(false); }
                };

                const sendToDatabase = async (action, payload) => {
                    setLoading(true);
                    try {
                        const response = await fetch(GAS_URL, { 
                            method: "POST", 
                            body: JSON.stringify({ action, payload }) 
                        });
                        return await response.json();
                    } finally { setLoading(false); }
                };

                const handleLogin = async (e, form) => {
                    e.preventDefault();
                    setLoginError("");
                    setLoading(true);
                    try {
                        const db = await fetchDatabase();
                        const user = db.users.find(u => String(u.username) === String(form.username) && String(u.password) === String(form.password));
                        if (user) { setCurrentUserData(user); } 
                        else { setLoginError("ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง"); }
                    } catch (err) { setLoginError("เกิดข้อผิดพลาดในการเชื่อมต่อ"); }
                    finally { setLoading(false); }
                };

                const handleExport = () => {
                    const headers = ["รหัสครุภัณฑ์", "ชื่อเครื่องมือ", "ยี่ห้อ/รุ่น/ขนาด", "Serial No.", "ผู้ผลิต", "ผู้จำหน่าย", "แผนก", "รับเครื่อง", "หมดประกัน", "สถานะ"];
                    const rows = assets.map(a => [`"${a.id}"`, `"${a.name}"`, `"${a.model}"`, `"${a.serialNo}"`, `"${a.manufacturer}"`, `"${a.vendor}"`, `"${a.department}"`, `"${formatToThaiDate(a.receivedDate)}"`, `"${formatToThaiDate(a.warrantyExpire)}"`, `"${a.status}"`]);
                    const content = "\uFEFF" + [headers, ...rows].map(r => r.join(",")).join("\n");
                    const blob = new Blob([content], { type: "text/csv;charset=utf-8;" });
                    const link = document.createElement("a");
                    link.href = URL.createObjectURL(blob);
                    link.download = `รายการเครื่องมือแพทย์_${new Date().toLocaleDateString('th-TH').replace(/\//g, '-')}.csv`;
                    link.click();
                };

                const handleAddAsset = async (e) => {
                    e.preventDefault();
                    const res = isEditAssetMode ? 
                        await sendToDatabase("updateAsset", { ...selectedAsset, ...assetFormData, lifespan: calculateLifespan(assetFormData.receivedDate) }) :
                        await sendToDatabase("addAsset", { ...assetFormData, docId: Date.now().toString(), createdAt: new Date().toISOString(), recordedBy: currentUserData.name, lifespan: calculateLifespan(assetFormData.receivedDate), repairHistory: [], maintainHistory: [], calHistory: [], loanHistory: [] });
                    if(res.status === "success") { fetchDatabase(); setIsAddModalOpen(false); }
                };

                const handleAddHistory = async (e) => {
                    e.preventDefault();
                    const updated = { ...selectedAsset };
                    const type = `${historyModal.type}History`;
                    if(historyModal.isEdit) {
                        updated[type] = updated[type].map(h => h.id === historyModal.data.id ? historyModal.data : h);
                    } else {
                        updated[type] = [{ ...historyModal.data, id: Date.now(), recordedBy: `${currentUserData.name} ${currentUserData.surname}` }, ...(updated[type] || [])];
                    }
                    const res = await sendToDatabase("updateAsset", updated);
                    if(res.status === "success") { setSelectedAsset(updated); setHistoryModal({ open: false, type: '', data: {}, isEdit: false }); fetchDatabase(); }
                };

                const saveStickerAsJpg = () => {
                    const sticker = document.getElementById('sticker-to-print');
                    if (!sticker) return;
                    html2canvas(sticker, { 
                        scale: 4, 
                        useCORS: true, 
                        backgroundColor: "#ffffff",
                        logging: false
                    }).then(canvas => {
                        const link = document.createElement('a');
                        link.download = `Sticker_${selectedAsset.id}.jpg`;
                        link.href = canvas.toDataURL('image/jpeg', 0.95);
                        link.click();
                    });
                };

                const renderFormattedName = (name) => {
                    if (!name) return "";
                    const parts = name.split(/[\(\)\/\-\|]/).filter(p => p.trim().length > 0);
                    if (parts.length >= 2) {
                        return (
                            <div className="flex flex-col leading-[1.0] tracking-tighter" style={{ letterSpacing: '-0.2px' }}>
                                <div className="font-[800]">{parts[0].trim()}</div>
                                <div className="font-[700] opacity-90 mt-0.5">{parts[1].trim()}</div>
                            </div>
                        );
                    }
                    return (
                        <div className="leading-[1.1] font-[800] tracking-tighter" style={{ letterSpacing: '-0.2px' }}>
                            {name}
                        </div>
                    );
                };

                const filteredAssets = assets.filter(a => (String(a.name||"").toLowerCase().includes(searchQuery.toLowerCase()) || String(a.id||"").includes(searchQuery)) && (filterDept === 'ทั้งหมด' || a.department === filterDept));

                if (!currentUserData) {
                    return <LoginView onLogin={handleLogin} loading={loading} error={loginError} />;
                }

                return (
                    <div className="bg-slate-100 min-h-screen pb-4 font-medium">
                        {loading && <div className="fixed inset-0 bg-white/60 backdrop-blur-sm z-[500] flex flex-col items-center justify-center"><Icon name="loader-2" className="animate-spin text-blue-600" size={40} /></div>}

                        <div className="max-w-6xl mx-auto px-4 pt-4 space-y-3">
                            <header className="flex flex-col md:flex-row justify-between items-center gap-2 py-2 border-b border-slate-300 no-print">
                                <div className="flex items-center gap-3">
                                    <div className="bg-blue-600 p-2 rounded-lg text-white shadow-md"><Icon name="cloud" size={20} /></div>
                                    <div><h1 className="text-lg font-black text-slate-800 uppercase leading-none">ระบบทะเบียนเครื่องมือแพทย์</h1><p className="text-[11px] font-bold text-blue-600 mt-1 uppercase tracking-wider">รพ.ยางชุมน้อย จังหวัดศรีสะเกษ</p></div>
                                </div>
                                <div className="flex items-center gap-2">
                                    <div className="bg-white border border-slate-200 rounded-lg px-3 py-1 flex items-center gap-3 shadow-sm">
                                        <div className="text-right">
                                            <p className="text-[13px] font-black leading-none">{currentUserData.name} {currentUserData.surname}</p>
                                            <p className="text-[10px] text-slate-400 uppercase font-bold leading-none mt-1">{currentUserData.role}</p>
                                        </div>
                                        <div className="w-8 h-8 rounded-full bg-slate-800 text-white flex items-center justify-center text-xs font-bold uppercase">{currentUserData.name[0]}</div>
                                    </div>
                                    <button onClick={handleExport} title="ส่งออก Excel" className="p-2 bg-emerald-50 text-emerald-600 border border-emerald-200 rounded-lg hover:bg-emerald-100 shadow-sm transition-all"><Icon name="file-down" size={16} /></button>
                                    <button onClick={fetchDatabase} className="p-2 bg-white border border-slate-300 rounded-lg hover:bg-slate-50 shadow-sm"><Icon name="refresh-cw" size={16} /></button>
                                    {currentUserData.role === 'admin' && <button onClick={() => setView(view === 'users' ? 'dashboard' : 'users')} className={`p-2 border rounded-lg transition-all shadow-sm ${view === 'users' ? 'bg-slate-800 text-white' : 'bg-white'}`}><Icon name="users" size={16} /></button>}
                                    <button onClick={() => { setAssetFormData(initialFormState); setIsEditAssetMode(false); setIsAddModalOpen(true); }} className="bg-blue-600 text-white px-4 py-2 rounded-lg font-black text-[13px] flex items-center gap-2 uppercase shadow-md hover:bg-blue-700 transition-all"><Icon name="plus" size={16} /> ลงทะเบียน</button>
                                    <button onClick={() => setCurrentUserData(null)} className="p-2 bg-white border border-slate-300 rounded-lg text-rose-500 shadow-sm"><Icon name="log-out" size={16} /></button>
                                </div>
                            </header>

                            {view === 'users' ? (
                                <div className="animate-fade-in py-2">
                                    <div className="flex justify-between items-end mb-3">
                                        <h2 className="text-xl font-black uppercase tracking-tight">จัดการผู้ใช้งานระบบ</h2>
                                        <button onClick={() => { setIsEditUserMode(false); setUserFormData({ username: '', password: '', name: '', surname: '', position: '', department: 'ER', role: 'user' }); setIsUserModalOpen(true); }} className="bg-slate-900 text-white px-3 py-1.5 rounded-lg font-black text-[11px] uppercase shadow-md"><Icon name="user-plus" size={14} className="mr-1"/> เพิ่มผู้ใช้</button>
                                    </div>
                                    <div className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
                                        <table className="w-full text-left text-sm">
                                            <thead className="bg-slate-50 border-b text-slate-500 font-black uppercase text-[10px]">
                                                <tr><th className="p-3">ชื่อ - นามสกุล</th><th className="p-3">ตำแหน่ง</th><th className="p-3">Username</th><th className="p-3">สิทธิ์</th><th className="p-3 text-center">จัดการ</th></tr>
                                            </thead>
                                            <tbody className="divide-y font-bold text-slate-700">
                                                {users.map(u => (
                                                    <tr key={u.id} className="hover:bg-slate-50">
                                                        <td className="p-3">{u.name} {u.surname}</td>
                                                        <td className="p-3 text-[12px]">{u.position} <span className="text-blue-500">({u.department})</span></td>
                                                        <td className="p-3">{u.username}</td>
                                                        <td className="p-3"><span className={`px-2 py-0.5 rounded text-[10px] ${u.role === 'admin' ? 'bg-rose-100 text-rose-600' : 'bg-blue-100 text-blue-700'}`}>{u.role}</span></td>
                                                        <td className="p-3 text-center">
                                                            <div className="flex items-center justify-center gap-2">
                                                                <button onClick={() => { setIsEditUserMode(true); setUserFormData(u); setIsUserModalOpen(true); }} className="text-slate-400 hover:text-blue-500 transition-colors"><Icon name="edit" size={18}/></button>
                                                                <button onClick={() => { if(window.confirm("ลบผู้ใช้?")) sendToDatabase("deleteUser", {id: u.id}).then(fetchDatabase); }} className="text-slate-400 hover:text-rose-500 transition-colors"><Icon name="trash-2" size={18}/></button>
                                                            </div>
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            ) : view === 'dashboard' ? (
                                <div className="space-y-3 animate-fade-in">
                                    <div className="relative bg-white rounded-[2rem] border border-slate-200 p-4 md:p-5 overflow-hidden shadow-sm">
                                        <div className="absolute top-0 right-0 opacity-[0.03] translate-x-5 -translate-y-5 pointer-events-none">
                                            <Icon name="stethoscope" size={140} />
                                        </div>
                                        <div className="relative z-10 flex flex-col md:flex-row items-center justify-between gap-4">
                                            <div className="flex-1 space-y-3 w-full text-center md:text-left">
                                                <div>
                                                    <h2 className="text-[20px] md:text-[24px] font-black text-slate-900 leading-none uppercase tracking-tighter mb-1">
                                                        Asset <span className="text-blue-600">Tracking</span>
                                                    </h2>
                                                    <div className="inline-block px-3 py-1 bg-blue-50 text-blue-600 rounded-full text-[10px] font-black uppercase tracking-[0.2em] border border-blue-100">
                                                        โรงพยาบาลยางชุมน้อย
                                                    </div>
                                                </div>
                                                <div className="relative w-full max-w-lg mx-auto md:mx-0">

                                            <button onClick={() => { if(window.confirm("ยืนยันการลบข้อมูลถาวร?")) sendToDatabase("deleteAsset", {docId: selectedAsset.docId}).then(fetchDatabase).then(() => setView('dashboard')); }} className="text-rose-500 text-[13px] font-black uppercase hover:bg-rose-50 px-4 py-2 rounded-xl transition-all flex items-center gap-2 justify-end ml-auto">
                                                <Icon name="trash-2" size={16}/> ลบข้อมูลออกจากระบบ
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            ) : view === 'sticker' && selectedAsset ? (
                                <div className="flex flex-col items-center justify-center p-6 min-h-[70vh] animate-fade-in">
                                    <div id="sticker-to-print" style={{ width: '100mm', height: '37.5mm' }} className="bg-white flex font-sans text-black shadow-2xl mb-10 overflow-hidden shrink-0 border border-black box-border p-1.5">
                                        <div className="w-[26mm] flex flex-col items-center justify-center shrink-0 border-r border-black pr-1.5">
                                            <img src={`https://quickchart.io/qr?size=300x300&ecLevel=L&text=${encodeURIComponent(GAS_URL + "?viewAsset=" + selectedAsset.id)}`} className="w-[23mm] h-[23mm]" alt="QR Code" />
                                            <div className="text-[13px] font-[900] text-black leading-none text-center w-full mt-0 uppercase">{selectedAsset.department}</div>
                                        </div>
                                        <div className="flex-1 pl-3 flex flex-col justify-between py-0.5 overflow-hidden">
                                            <div className="flex-1 flex flex-col justify-start overflow-hidden pt-0.5">
                                                <div style={{ fontSize: '16px', fontFamily: "'Sarabun', sans-serif" }}>
                                                    {renderFormattedName(selectedAsset.name)}
                                                </div>
                                            </div>
                                            <div className="flex flex-col justify-end w-full">
                                                <div className="text-right font-[900] text-[16px] leading-none mb-1.5 pr-1">ID: {selectedAsset.id}</div>
                                                <div className="border-t-[1.5px] border-black w-full mb-1"></div>
                                                <div className="text-[13px] font-[800] uppercase flex justify-between tracking-tighter leading-none py-1">
                                                    <span>รับ: {formatToThaiDate(selectedAsset.receivedDate)}</span>
                                                    <span className="ml-auto">ประกัน: {formatToThaiDate(selectedAsset.warrantyExpire)}</span>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="flex gap-4 no-print">
                                        <button onClick={() => window.print()} className="bg-slate-900 text-white px-8 py-3 rounded-xl font-black uppercase flex items-center gap-2 shadow-xl hover:bg-black transition-all active:scale-95"><Icon name="printer" size={18}/> พิมพ์สติกเกอร์</button>
                                        <button onClick={saveStickerAsJpg} className="bg-emerald-600 text-white px-8 py-3 rounded-xl font-black uppercase flex items-center gap-2 shadow-xl hover:bg-emerald-700 transition-all active:scale-95"><Icon name="save" size={18}/> บันทึกเป็น JPG</button>
                                        <button onClick={() => setView('dashboard')} className="bg-white border border-slate-300 text-slate-600 px-8 py-3 rounded-xl font-black uppercase hover:bg-slate-50 transition-all">ย้อนกลับ</button>
                                    </div>
                                    <p className="mt-4 text-[13px] text-slate-400 font-bold uppercase tracking-widest">ขนาดสติกเกอร์: 100mm x 37.5mm</p>
                                </div>
                            ) : null}
                        </div>

                        {/* Modals อื่นๆ ยังคงเดิม */}
                        {isAddModalOpen && (
                            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[2000] flex items-center justify-center p-4">
                                <div className="bg-white w-full max-w-3xl rounded-xl shadow-2xl border border-slate-200 overflow-hidden flex flex-col max-h-[90vh] animate-fade-in">
                                    <div className="bg-blue-600 p-4 flex justify-between items-center text-white shrink-0">
                                        <h2 className="text-lg font-black uppercase flex items-center gap-2"><Icon name={isEditAssetMode ? "edit" : "plus-circle"} size={22}/> {isEditAssetMode ? "แก้ไขเครื่องมือ" : "ลงทะเบียนเครื่องมือใหม่"}</h2>
                                        <button onClick={() => setIsAddModalOpen(false)} className="bg-white/20 p-1 rounded-full hover:rotate-90 transition-all"><Icon name="x" size={20}/></button>
                                    </div>
                                    <form onSubmit={handleAddAsset} className="flex-1 overflow-hidden flex flex-col">
                                        <div className="p-6 md:p-8 overflow-y-auto no-scrollbar space-y-4">
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-4">
                                                <InputField label="รหัสครุภัณฑ์ (ID) *" value={assetFormData.id} onChange={v => setAssetFormData({...assetFormData, id: v})} required />
                                                <InputField label="ชื่อเครื่องมือแพทย์ *" value={assetFormData.name} onChange={v => setAssetFormData({...assetFormData, name: v})} required />
                                                <InputField label="ยี่ห้อ/รุ่น/ขนาด" value={assetFormData.model} onChange={v => setAssetFormData({...assetFormData, model: v})} />
                                                <InputField label="Serial No." value={assetFormData.serialNo} onChange={v => setAssetFormData({...assetFormData, serialNo: v})} />
                                                <InputField label="ผู้ผลิต" value={assetFormData.manufacturer} onChange={v => setAssetFormData({...assetFormData, manufacturer: v})} />
                                                <InputField label="ผู้จำหน่าย" value={assetFormData.vendor} onChange={v => setAssetFormData({...assetFormData, vendor: v})} />
                                                <InputField label="เบอร์ช่างติดต่อ" value={assetFormData.technicianPhone} onChange={v => setAssetFormData({...assetFormData, technicianPhone: v})} />
                                                <InputField label="หน่วยงานที่รับผิดชอบ" options={DEPARTMENTS} value={assetFormData.department} onChange={v => setAssetFormData({...assetFormData, department: v})} />
                                                <div className="col-span-full border-t border-slate-100 pt-3"></div>
                                                <InputField label="วันที่รับเครื่อง" type="date" value={assetFormData.receivedDate} onChange={v => setAssetFormData({...assetFormData, receivedDate: v})} />
                                                <InputField label="วันหมดประกัน" type="date" value={assetFormData.warrantyExpire} onChange={v => setAssetFormData({...assetFormData, warrantyExpire: v})} />
                                                <InputField label="อายุใช้งาน" value={assetFormData.lifespan} disabled />
                                                <InputField label="วันเปลี่ยนแบตล่าสุด" type="date" value={assetFormData.batteryChangeDate} onChange={v => setAssetFormData({...assetFormData, batteryChangeDate: v})} />
                                                <div className="col-span-full">
                                                    <InputField label="สถานะเครื่องมือ" options={STATUS_OPTIONS} value={assetFormData.status} onChange={v => setAssetFormData({...assetFormData, status: v})} />
                                                </div>
                                            </div>
                                        </div>
                                        <div className="p-5 bg-slate-50 border-t border-slate-200 flex gap-3 shrink-0">
                                            <button type="button" onClick={() => setIsAddModalOpen(false)} className="flex-1 py-2.5 border border-slate-300 bg-white rounded-xl font-black uppercase text-slate-500 hover:bg-slate-50 text-sm">ยกเลิก</button>
                                            <button type="submit" className="flex-[2] py-2.5 bg-blue-600 text-white rounded-xl font-black uppercase shadow-lg hover:bg-blue-700 transition-all flex justify-center items-center gap-2"><Icon name="save" size={18} /> บันทึกข้อมูล</button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        )}

                        {isUserModalOpen && (
                            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[2001] flex items-center justify-center p-4">
                                <div className="bg-white w-full max-w-md rounded-xl p-6 shadow-2xl animate-fade-in flex flex-col">
                                    <div className="flex justify-between items-center mb-6">
                                        <h2 className="text-lg font-black uppercase flex items-center gap-2 text-slate-800"><Icon name={isEditUserMode ? "edit" : "user-plus"} size={20} className="text-blue-600"/> {isEditUserMode ? "แก้ไขผู้ใช้งาน" : "เพิ่มผู้ใช้งาน"}</h2>
                                        <button onClick={() => { setIsUserModalOpen(false); setIsEditUserMode(false); }} className="bg-slate-100 p-2 rounded-full hover:bg-rose-50 transition-all"><Icon name="x" size={18}/></button>
                                    </div>
                                    <form onSubmit={(e) => { e.preventDefault(); const action = isEditUserMode ? "updateUser" : "addUser"; const payload = isEditUserMode ? userFormData : { ...userFormData, id: Date.now().toString() }; sendToDatabase(action, payload).then(fetchDatabase); setIsUserModalOpen(false); }} className="space-y-4">
                                        <div className="grid grid-cols-2 gap-4">
                                            <InputField label="ชื่อ" value={userFormData.name} onChange={v => setUserFormData({...userFormData, name: v})} required />
                                            <InputField label="นามสกุล" value={userFormData.surname} onChange={v => setUserFormData({...userFormData, surname: v})} required />
                                        </div>
                                        <InputField label="ตำแหน่ง" value={userFormData.position} onChange={v => setUserFormData({...userFormData, position: v})} />
                                        <InputField label="หน่วยงาน" options={DEPARTMENTS} value={userFormData.department} onChange={v => setUserFormData({...userFormData, department: v})} />
                                        <div className="border-t pt-4 space-y-4">
                                            <InputField label="Username" value={userFormData.username} onChange={v => setUserFormData({...userFormData, username: v})} required disabled={isEditUserMode} />
                                            <InputField label="Password" type="text" value={userFormData.password} onChange={v => setUserFormData({...userFormData, password: v})} required icon={<Icon name="lock" size={16} className="text-blue-500"/>} />
                                            <InputField label="สิทธิ์" options={["user", "admin"]} value={userFormData.role} onChange={v => setUserFormData({...userFormData, role: v})} />
                                        </div>
                                        <button className="w-full py-3 bg-blue-600 text-white rounded-xl font-black uppercase mt-4 shadow-xl hover:bg-blue-700 transition-all">บันทึกข้อมูล</button>
                                    </form>
                                </div>
                            </div>
                        )}

                        {historyModal.open && (
                            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[2002] flex items-center justify-center p-4">
                                <div className="bg-white w-full max-w-lg rounded-[2.5rem] p-8 shadow-2xl border border-slate-300 animate-fade-in overflow-hidden relative max-h-[90vh] flex flex-col">
                                    <div className="flex justify-between items-center mb-6 text-slate-800 shrink-0">
                                        <h2 className="text-lg font-black uppercase flex items-center gap-2">
                                            <Icon name={historyModal.type === 'repair' ? 'wrench' : historyModal.type === 'maintain' ? 'settings' : historyModal.type === 'cal' ? 'activity' : 'arrow-left-right'} size={20} className="text-blue-600"/> 
                                            {historyModal.isEdit ? 'แก้ไขข้อมูล' : 'เพิ่มข้อมูล'}{historyModal.type === 'repair' ? 'การซ่อม' : historyModal.type === 'maintain' ? 'บำรุงรักษา' : historyModal.type === 'cal' ? 'สอบเทียบ' : 'ยืม-คืน'}
                                        </h2>
                                        <button onClick={() => setHistoryModal({ open: false, type: '', data: {}, isEdit: false })} className="text-slate-400 hover:text-slate-800">
                                            <Icon name="x" size={24}/>
                                        </button>
                                    </div>
                                    <div className="overflow-y-auto no-scrollbar flex-1 pb-4">
                                        <form onSubmit={handleAddHistory} className="space-y-4">
                                            <InputField label="วันที่" type="date" value={historyModal.data.date || ''} onChange={v => setHistoryModal({...historyModal, data: {...historyModal.data, date: v}})} required />
                                            {historyModal.type === 'repair' && (
                                                <>
                                                    <InputField label="อาการ" value={historyModal.data.symptom || ''} onChange={v => setHistoryModal({...historyModal, data: {...historyModal.data, symptom: v}})} />
                                                    <InputField label="วิธีแก้ไข" value={historyModal.data.fix || ''} onChange={v => setHistoryModal({...historyModal, data: {...historyModal.data, fix: v}})} />
                                                    <InputField label="สรุป" value={historyModal.data.summary || ''} onChange={v => setHistoryModal({...historyModal, data: {...historyModal.data, summary: v}})} />
                                                    <InputField label="Downtime" value={historyModal.data.downtime || ''} onChange={v => setHistoryModal({...historyModal, data: {...historyModal.data, downtime: v}})} />
                                                    <InputField label="ผู้ดำเนินการ" value={historyModal.data.by || ''} onChange={v => setHistoryModal({...historyModal, data: {...historyModal.data, by: v}})} />
                                                    <InputField label="ค่าใช้จ่าย" type="number" value={historyModal.data.cost || ''} onChange={v => setHistoryModal({...historyModal, data: {...historyModal.data, cost: v}})} />
                                                </>
                                            )}
                                            {historyModal.type === 'maintain' && (
                                                <>
                                                    <InputField label="รายละเอียด" value={historyModal.data.detail || ''} onChange={v => setHistoryModal({...historyModal, data: {...historyModal.data, detail: v}})} />
                                                    <InputField label="ผู้ดำเนินการ" value={historyModal.data.by || ''} onChange={v => setHistoryModal({...historyModal, data: {...historyModal.data, by: v}})} />
                                                    <InputField label="รอบถัดไป" type="date" value={historyModal.data.nextDate || ''} onChange={v => setHistoryModal({...historyModal, data: {...historyModal.data, nextDate: v}})} />
                                                </>
                                            )}
                                            {historyModal.type === 'cal' && (
                                                <>
                                                    <InputField label="ผลการ CAL" value={historyModal.data.result || ''} icon={<Icon name="activity" size={14} className="text-emerald-500"/>} onChange={v => setHistoryModal({...historyModal, data: {...historyModal.data, result: v}})} />
                                                    <InputField label="ผู้ดำเนินการ" value={historyModal.data.by || ''} onChange={v => setHistoryModal({...historyModal, data: {...historyModal.data, by: v}})} />
                                                    <InputField label="Due Date" type="date" value={historyModal.data.due || ''} onChange={v => setHistoryModal({...historyModal, data: {...historyModal.data, due: v}})} />
                                                    <InputField label="ลิ้งค์ใบ Cer" value={historyModal.data.cerUrl || ''} onChange={v => setHistoryModal({...historyModal, data: {...historyModal.data, cerUrl: v}})} />
                                                </>
                                            )}
                                            {historyModal.type === 'loan' && (
                                                <>
                                                    <InputField label="เครื่องที่ยืม" value={historyModal.data.item || ''} onChange={v => setHistoryModal({...historyModal, data: {...historyModal.data, item: v}})} />
                                                    <InputField label="ผู้ยืม" value={historyModal.data.name || ''} onChange={v => setHistoryModal({...historyModal, data: {...historyModal.data, name: v}})} />
                                                    <InputField label="สถานะ" options={["ยังไม่คืน", "คืนแล้ว"]} value={historyModal.data.status || 'ยังไม่คืน'} onChange={v => setHistoryModal({...historyModal, data: {...historyModal.data, status: v}})} />
                                                </>
                                            )}
                                            <button className="w-full py-3 bg-slate-800 text-white rounded-2xl font-black uppercase mt-4 shadow-xl active:scale-95 text-md transition-all">บันทึกข้อมูล</button>
                                        </form>
                                    </div>
                                </div>
                            </div>
                        )}

                        {viewImageModal && (
                            <div className="fixed inset-0 bg-slate-900/90 backdrop-blur-sm z-[999] flex items-center justify-center p-4 animate-fade-in" onClick={() => setViewImageModal(null)}>
                                <button className="absolute top-8 right-8 text-white bg-white/20 p-4 rounded-full hover:bg-rose-500 hover:text-white transition-all shadow-lg" onClick={(e) => { e.stopPropagation(); setViewImageModal(null); }}>
                                    <Icon name="x" size={28}/>
                                </button>
                                <img src={viewImageModal} alt="Certificate" className="max-w-full max-h-[90vh] object-contain rounded-xl shadow-2xl" onClick={(e) => e.stopPropagation()} />
                            </div>
                        )}
                    </div>
                );
            };

            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<App />);
        })();
    </script>
</body>
</html>
