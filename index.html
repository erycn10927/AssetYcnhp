<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบทะเบียนเครื่องมือแพทย์ (Cloud Sync Final)</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        input[type="date"]::-webkit-inner-spin-button, 
        input[type="date"]::-webkit-calendar-picker-indicator { opacity: 0.5; cursor: pointer; }

        @media print { 
            @page { size: 50mm 30mm; margin: 0; }
            body, html { width: 50mm; height: 30mm; background: white; margin: 0; padding: 0; }
            .no-print { display: none !important; } 
            body * { visibility: hidden; }
            
            #sticker-to-print, #sticker-to-print * { visibility: visible; }
            #sticker-to-print { 
                position: absolute !important; 
                left: 0 !important; 
                top: 0 !important; 
                width: 420px !important;
                height: 252px !important;
                margin: 0 !important; 
                box-shadow: none !important; 
                border: none !important; 
                border-radius: 0 !important;
                transform: scale(0.45) !important;
                transform-origin: top left !important;
                page-break-inside: avoid;
            } 
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-presets="react">
        (function() {
            const { useState, useEffect, useMemo, useRef } = React;

            // ==========================================
            // ⚠️ วาง URL ของ Google Apps Script ที่นี่
            // ==========================================
            const GAS_URL = "https://script.google.com/macros/s/AKfycbz9L-vcZ_7MrT2ir7_bA1imKovYLcYwyg9xtftnFpS32qNwZDFamByphwlVkCh5Pkfj/exec"; 
            
            const Icon = ({ name, size = 16, className = "" }) => {
                const spanRef = useRef(null);
                useEffect(() => {
                    if (window.lucide && spanRef.current) {
                        spanRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
                        window.lucide.createIcons({ root: spanRef.current });
                        const svg = spanRef.current.querySelector('svg');
                        if (svg) {
                            svg.setAttribute('width', size);
                            svg.setAttribute('height', size);
                            if (className) {
                                className.split(' ').forEach(c => svg.classList.add(c));
                            }
                        }
                    }
                }, [name, size, className]);
                return <span ref={spanRef} className="inline-flex items-center justify-center leading-none"></span>;
            };

            const LucideIconsList = {
                Plus: "plus", Search: "search", X: "x", Save: "save", ArrowLeft: "arrow-left", 
                Info: "info", Wrench: "wrench", Activity: "activity", ArrowLeftRight: "arrow-left-right",
                Building2: "building-2", Tag: "tag", MapPin: "map-pin", ClipboardList: "clipboard-list", 
                ChevronRight: "chevron-right", FileText: "file-text", User: "user", Lock: "lock",
                LogIn: "log-in", LogOut: "log-out", AlertCircle: "alert-circle", Hash: "hash", 
                Printer: "printer", Stethoscope: "stethoscope", Users: "users", RefreshCw: "refresh-cw", 
                ShieldCheck: "shield-check", Battery: "battery", Clock: "clock", CalendarClock: "calendar-clock", 
                Calendar: "calendar", Box: "box", PlusCircle: "plus-circle", Trash2: "trash-2", 
                UserPlus: "user-plus", Shield: "shield", IdCard: "id-card", Cloud: "cloud", FileDown: "file-down",
                CircleCheck: "circle-check", Settings: "settings", Loader2: "loader-2", Phone: "phone",
                Banknote: "banknote", Paperclip: "paperclip", ExternalLink: "external-link", Image: "image", Edit: "edit"
            };

            const Icons = Object.fromEntries(Object.entries(LucideIconsList).map(([key, name]) => [key, (props) => <Icon name={name} {...props} />]));
            const { Plus, Search, X, Save, ArrowLeft, Info, Wrench, Activity, ArrowLeftRight, Building2, Tag, MapPin, ClipboardList, ChevronRight, FileText, User, Lock, LogIn, LogOut, AlertCircle, Hash, Printer, Stethoscope, Users, RefreshCw, ShieldCheck, Battery, Clock, CalendarClock, Calendar, Box, PlusCircle, Trash2, UserPlus, Shield, IdCard, Cloud, FileDown, CircleCheck, Settings, Loader2, Phone, Banknote, Paperclip, ExternalLink, Image: ImageIcon, Edit } = Icons;

            const DEPARTMENTS = ["ER", "IPD", "LR", "OPD", "NCD", "PCU", "LAB", "ห้องยา", "ทันตกรรม", "งานคร.", "กายภาพ", "แผนไทย", "IT", "ส่วนกลาง"];
            const STATUS_OPTIONS = ["ใช้งานปกติ", "อยู่ในระยะ CAL", "แบตหมดอายุ", "ส่งซ่อม", "ไม่พร้อมใช้งาน"];

            const formatToThaiDate = (dateString) => {
                if (!dateString || dateString === "-") return "-";
                const date = new Date(dateString);
                if (isNaN(date.getTime())) return dateString;
                return `${String(date.getDate()).padStart(2, '0')}-${String(date.getMonth() + 1).padStart(2, '0')}-${date.getFullYear() + 543}`;
            };

            const calculateLifespan = (receivedDate) => {
                if (!receivedDate || receivedDate === "-") return "-";
                const start = new Date(receivedDate);
                const now = new Date();
                if (start > now) return "0 ปี 0 เดือน";
                let years = now.getFullYear() - start.getFullYear();
                let months = now.getMonth() - start.getMonth();
                if (months < 0) { years--; months += 12; }
                return `${years} ปี ${months} เดือน`;
            };

            const isBatteryExpired = (dateStr) => {
                if (!dateStr || dateStr === "-") return false;
                const d = new Date(dateStr);
                return !isNaN(d.getTime()) && (new Date().getTime() - d.getTime()) / (1000 * 60 * 60 * 24) >= 730; 
            };

            const isWarrantyExpired = (dateStr) => {
                if (!dateStr || dateStr === "-") return false;
                const d = new Date(dateStr);
                d.setHours(23, 59, 59, 999);
                return !isNaN(d.getTime()) && new Date() > d;
            };

            const isCalDue = (calHistory) => {
                if (!calHistory || calHistory.length === 0) return false;
                if (!calHistory[0].due || calHistory[0].due === "-") return false;
                const d = new Date(calHistory[0].due);
                d.setHours(23, 59, 59, 999);
                return !isNaN(d.getTime()) && new Date() > d;
            };

            const StatusBadge = ({ status }) => {
                const config = { "ใช้งานปกติ": "bg-emerald-500 text-white", "อยู่ในระยะ CAL": "bg-blue-600 text-white", "แบตหมดอายุ": "bg-orange-500 text-white", "ส่งซ่อม": "bg-amber-400 text-slate-800", "ไม่พร้อมใช้งาน": "bg-rose-600 text-white" }[status] || "bg-slate-500 text-white";
                return (
                    <div className={`${config} px-2 py-0.5 rounded-full border border-slate-400/30 flex items-center gap-1.5 shadow-sm`}>
                        <span className="w-1.5 h-1.5 rounded-full bg-white animate-pulse"></span>
                        <span className="text-[10px] font-bold uppercase tracking-tight leading-none">{status}</span>
                    </div>
                );
            };

            const InputField = ({ label, value, onChange, placeholder, type = "text", options = null, icon }) => (
                <div className="flex flex-col gap-1 w-full">
                    <label className="text-[12px] font-bold text-slate-600 flex items-center gap-1.5 ml-0.5">
                        {icon} {label}
                    </label>
                    {options ? (
                        <select className="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-xl focus:border-blue-500 focus:bg-white outline-none transition text-[14px] font-medium" value={value || ''} onChange={e => onChange(e.target.value)}>
                            <option value="">เลือก{label}</option>
                            {options.map(opt => <option key={opt} value={opt}>{opt}</option>)}
                        </select>
                    ) : (
                        <input type={type} placeholder={placeholder || '...'} className="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-xl focus:border-blue-500 focus:bg-white outline-none transition text-[14px] font-medium" value={value || ''} onChange={e => onChange(e.target.value)} />
                    )}
                </div>
            );

            // ==========================================
            // Component สำหรับอัปโหลดรูป / Paste รูปภาพ
            // ==========================================
            const ImageUploadField = ({ label, value, onChange }) => {
                const fileInputRef = useRef(null);

                const processFile = (file) => {
                    if (!file.type.startsWith('image/')) return alert('กรุณาอัปโหลดไฟล์รูปภาพเท่านั้น');
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const img = new Image();
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            let width = img.width;
                            let height = img.height;
                            const MAX_SIZE = 800; // บีบอัดขนาดเพื่อลดภาระ Cloud
                            if (width > height) {
                                if (width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; }
                            } else {
                                if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; }
                            }
                            canvas.width = width;
                            canvas.height = height;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, width, height);
                            const dataUrl = canvas.toDataURL('image/jpeg', 0.7); // คุณภาพ 70%
                            onChange(dataUrl);
                        };
                        img.src = e.target.result;
                    };
                    reader.readAsDataURL(file);
                };

                useEffect(() => {
                    const handleGlobalPaste = (e) => {
                        const items = (e.clipboardData || window.clipboardData).items;
                        for (let index in items) {
                            const item = items[index];
                            if (item.kind === 'file' && item.type.startsWith('image/')) {
                                e.preventDefault();
                                const blob = item.getAsFile();
                                processFile(blob);
                            }
                        }
                    };
                    document.addEventListener('paste', handleGlobalPaste);
                    return () => document.removeEventListener('paste', handleGlobalPaste);
                }, []); // eslint-disable-line react-hooks/exhaustive-deps

                return (
                    <div className="flex flex-col gap-1 w-full mt-4">
                        <label className="text-[12px] font-bold text-emerald-700 flex items-center gap-1.5 ml-0.5 mb-1">
                            <ImageIcon size={14} className="text-emerald-500"/> {label}
                        </label>
                        <div 
                            className="border-2 border-dashed border-emerald-300 bg-emerald-50 rounded-2xl p-4 text-center cursor-pointer hover:bg-emerald-100 transition-colors shadow-inner"
                            onClick={() => fileInputRef.current.click()}
                        >
                            {value ? (
                                <div className="relative inline-block group">
                                    <img src={value} alt="Preview" className="max-h-40 rounded-xl shadow-md border border-emerald-200 mx-auto" />
                                    <button type="button" onClick={(e) => { e.stopPropagation(); onChange(''); }} className="absolute -top-3 -right-3 bg-rose-500 text-white p-1.5 rounded-full shadow-lg hover:bg-rose-600 transition-all opacity-0 group-hover:opacity-100">
                                        <X size={16}/>
                                    </button>
                                    <p className="text-[10px] text-emerald-600 font-bold mt-2">คลิกเพื่อเปลี่ยนรูป</p>
                                </div>
                            ) : (
                                <div className="flex flex-col items-center gap-3 py-6">
                                    <div className="bg-white p-4 rounded-full shadow-sm text-emerald-500">
                                        <Plus size={24}/>
                                    </div>
                                    <p className="text-[14px] font-black text-emerald-800">คลิกเลือกรูป หรือ Ctrl+V วางรูป</p>
                                    <p className="text-[11px] font-bold text-emerald-600/70">รองรับไฟล์ JPG, PNG</p>
                                </div>
                            )}
                        </div>
                        <input type="file" accept="image/*" className="hidden" ref={fileInputRef} onChange={(e) => { if(e.target.files[0]) processFile(e.target.files[0]); }} />
                    </div>
                );
            };

            const LoginView = ({ onLogin, error, loading }) => {
                const [form, setForm] = useState({ username: '', password: '' });
                const handleUsernameChange = (v) => setForm({...form, username: v.replace(/[^a-zA-Z0-9@._-]/g, '')});

                return (
                    <div className="min-h-screen flex items-center justify-center bg-slate-50 p-6 animate-fade-in">
                        <div className="w-full max-w-xs bg-white rounded-3xl shadow-2xl border border-slate-300 overflow-hidden">
                            <div className="bg-blue-600 p-8 text-white text-center relative overflow-hidden">
                                <div className="absolute top-0 right-0 opacity-10 translate-x-4 -translate-y-4">
                                    <Cloud size={100}/>
                                </div>
                                <Stethoscope size={44} className="mx-auto mb-4 opacity-80 relative z-10"/>
                                <h1 className="text-xl font-black uppercase relative z-10 leading-normal">ระบบเครื่องมือแพทย์</h1>
                                <p className="text-[12px] opacity-90 mt-2 uppercase tracking-wide font-bold relative z-10 text-blue-200">
                                    โรงพยาบาลยางชุมน้อย<br/>จังหวัดศรีสะเกษ
                                </p>
                            </div>
                            <form onSubmit={(e) => onLogin(e, form)} className="p-6 space-y-4 relative z-20">
                                {error && (
                                    <div className="p-3 bg-rose-50 border border-rose-200 text-rose-600 text-[12px] font-bold rounded-lg flex items-start gap-2 break-words leading-tight">
                                        <AlertCircle size={18} className="shrink-0 mt-0.5" /> 
                                        <span dangerouslySetInnerHTML={{__html: error}}></span>
                                    </div>
                                )}
                                <InputField label="ชื่อผู้ใช้" icon={<User size={14} className="text-blue-500"/>} value={form.username} onChange={handleUsernameChange} />
                                <InputField label="รหัสผ่าน" type="password" icon={<Lock size={14} className="text-blue-500"/>} value={form.password} onChange={v => setForm({...form, password: v})} />
                                <button disabled={loading} type="submit" className="w-full py-3 bg-blue-600 text-white rounded-xl font-black border border-blue-700 flex items-center justify-center gap-2 mt-2 uppercase disabled:opacity-50 transition-all hover:bg-blue-700 active:scale-95 shadow-md">
                                    {loading ? <Loader2 className="animate-spin" size={18}/> : <LogIn size={18}/>}
                                    {loading ? 'กำลังเชื่อมต่อ Cloud...' : 'เข้าสู่ระบบ'}
                                </button>
                                <p className="text-center text-[12px] font-bold text-slate-400 mt-4 border-t border-slate-100 pt-4">หากไม่มี username กรุณาติดต่อ admin</p>
                            </form>
                        </div>
                    </div>
                );
            };

            const App = () => {
                const [assets, setAssets] = useState([]);
                const [users, setUsers] = useState([]);
                const [currentUserData, setCurrentUserData] = useState(null);
                const [loading, setLoading] = useState(false);
                const [alert, setAlert] = useState(null);
                const [view, setView] = useState('dashboard');
                const [searchQuery, setSearchQuery] = useState('');
                const [filterDept, setFilterDept] = useState('ทั้งหมด');
                const [isAddModalOpen, setIsAddModalOpen] = useState(false);
                const [isEditAssetMode, setIsEditAssetMode] = useState(false); // สถานะโหมดแก้ไข
                const [addModalTab, setAddModalTab] = useState('general');
                const [selectedAsset, setSelectedAsset] = useState(null);
                const [historyModal, setHistoryModal] = useState({ open: false, type: '', data: {}, isEdit: false }); // เพิ่ม isEdit
                const [isUserModalOpen, setIsUserModalOpen] = useState(false);
                const [userFormData, setUserFormData] = useState({ username: '', password: '', name: '', surname: '', position: '', department: 'ER', role: 'user' });
                const [viewImageModal, setViewImageModal] = useState(null); 

                const initialFormState = { 
                    id: '', name: '', model: '', serialNo: '', manufacturer: '', vendor: '', technicianPhone: '', department: 'ER',
                    receivedDate: '', warrantyExpire: '', lifespan: '', batteryChangeDate: '', status: 'ใช้งานปกติ',
                    repairDate: '', repairSymptom: '', repairSummary: '', repairFix: '', repairDowntime: '', repairCost: '', 
                    maintainDate: '', maintainDetail: '', maintainBy: '', maintainNextDate: '', 
                    calDate: '', calResult: '', calBy: '', calDue: '', calCerUrl: '', 
                    loanDate: '', loanItem: '', loanAmount: '1', loanPerson: '', loanStatus: 'ยังไม่คืน'
                };
                const [assetFormData, setAssetFormData] = useState(initialFormState);

                useEffect(() => { 
                    if (assetFormData.receivedDate) {
                        setAssetFormData(prev => ({ ...prev, lifespan: calculateLifespan(prev.receivedDate) })); 
                    }
                }, [assetFormData.receivedDate]);

                const fetchDatabase = async () => {
                    if(!GAS_URL || GAS_URL.includes("นำ_URL")) return { success: false, message: "กรุณาใส่ URL ของ Apps Script" };
                    try {
                        const response = await fetch(GAS_URL, { redirect: "follow" });
                        const textData = await response.text();
                        try {
                            const result = JSON.parse(textData);
                            if (result.status === "error") return { success: false, message: result.message };
                            setAssets(result.assets || []);
                            setUsers(result.users || []);
                            return { success: true, users: result.users || [], assets: result.assets || [] };
                        } catch (e) {
                            return { success: false, message: "สิทธิ์การเข้าถึง Google Script ผิดพลาด หรือ URL ไม่ถูกต้อง" };
                        }
                    } catch (e) {
                        return { success: false, message: "ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้" };
                    }
                };

                const sendToDatabase = async (action, payload) => {
                    try {
                        const response = await fetch(GAS_URL, { 
                            method: "POST", 
                            headers: { "Content-Type": "text/plain;charset=utf-8" }, 
                            body: JSON.stringify({ action, payload }), 
                            redirect: "follow" 
                        });
                        return JSON.parse(await response.text());
                    } catch (e) { 
                        throw new Error("การเชื่อมต่อล้มเหลว"); 
                    }
                };

                const handleLogin = async (e, form) => {
                    e.preventDefault();
                    if(!form.username || !form.password) return;
                    setLoading(true);
                    
                    const db = await fetchDatabase();
                    
                    if (db.success) {
                        const cloudUsers = db.users;

                        const user = cloudUsers.find(u => String(u.username) === String(form.username) && String(u.password) === String(form.password));
                        
                        if (user) {
                            setCurrentUserData(user);
                            setAlert({ message: `เข้าสู่ระบบสำเร็จ ยินดีต้อนรับคุณ ${user.name}`, type: "success" });
                        } else if (cloudUsers.length === 0 && String(form.username) === 'admin' && String(form.password) === '1234') {
                            setCurrentUserData({ id: 'admin-temp', name: 'ผู้ดูแลระบบ', surname: '(ชั่วคราว)', position: 'Admin', department: 'IT', username: 'admin', role: 'admin' });
                            setAlert({ message: "⚠️ เข้าสู่ระบบฐานะผู้ดูแล กรุณาไปที่ 'จัดการผู้ใช้งาน' เพื่อสร้างบัญชีใหม่", type: "success" });
                        } else {
                            setAlert({ message: "ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง", type: "error" });
                        }
                    } else {
                        setAlert({ message: db.message, type: "error" });
                    }
                    setLoading(false);
                    setTimeout(() => setAlert(null), 4000);
                };

                const handleAddUser = async (e) => {
                    e.preventDefault();
                    if(!userFormData.username || !userFormData.password || !userFormData.name) {
                        setAlert({ message: "กรุณากรอกข้อมูลสำคัญให้ครบถ้วน", type: "error" });
                        setTimeout(() => setAlert(null), 3000);
                        return;
                    }
                    if(users.some(u => String(u.username) === String(userFormData.username))) {
                        setAlert({ message: "Username นี้มีในระบบแล้ว", type: "error" });
                        setTimeout(() => setAlert(null), 3000);
                        return;
                    }

                    const newUser = { ...userFormData, id: Date.now().toString() };
                    setLoading(true);
                    try {
                        const res = await sendToDatabase("addUser", newUser);
                        if(res.status === "success") { 
                            setUsers([...users, newUser]); 
                            setIsUserModalOpen(false); 
                            setUserFormData({ username: '', password: '', name: '', surname: '', position: '', department: 'ER', role: 'user' }); 
                            setAlert({ message: "เพิ่มผู้ใช้งานสำเร็จ", type: "success" }); 
                        } else {
                            throw new Error(res.message);
                        }
                    } catch(err) { 
                        setAlert({ message: err.message, type: "error" }); 
                    } finally { 
                        setLoading(false); 
                        setTimeout(() => setAlert(null), 3000); 
                    }
                };

                const handleDeleteUser = async (userId) => {
                    if(userId === currentUserData.id) return window.alert("ไม่สามารถลบบัญชีที่กำลังใช้งานอยู่ได้");
                    if(window.confirm("ยืนยันการลบผู้ใช้งานนี้ออกจากระบบ Cloud?")) {
                        setLoading(true);
                        try {
                            const res = await sendToDatabase("deleteUser", { id: userId });
                            if(res.status === "success") { 
                                setUsers(users.filter(u => u.id !== userId)); 
                                setAlert({ message: "ลบผู้ใช้ออกจากระบบสำเร็จ", type: "success" }); 
                            } else {
                                throw new Error(res.message);
                            }
                        } catch(err) { 
                            setAlert({ message: err.message, type: "error" }); 
                        } finally { 
                            setLoading(false); 
                            setTimeout(() => setAlert(null), 3000); 
                        }
                    }
                };

                const handleAddAsset = async (e) => {
                    e.preventDefault();
                    if (!assetFormData.id || !assetFormData.name) {
                        setAlert({ message: "กรุณากรอกรหัสและชื่อเครื่องมือ (Tab 1)", type: "error" });
                        setTimeout(() => setAlert(null), 3000);
                        return;
                    }
                    
                    setLoading(true);

                    // 🔴 โหมดแก้ไขข้อมูลทั่วไป
                    if (isEditAssetMode) {
                        const updatedAsset = {
                            ...selectedAsset, // ดึงข้อมูลเดิมมา (รวมถึงประวัติ)
                            id: assetFormData.id, name: assetFormData.name, model: assetFormData.model, serialNo: assetFormData.serialNo, manufacturer: assetFormData.manufacturer, vendor: assetFormData.vendor, technicianPhone: assetFormData.technicianPhone, department: assetFormData.department, receivedDate: assetFormData.receivedDate, warrantyExpire: assetFormData.warrantyExpire, lifespan: calculateLifespan(assetFormData.receivedDate), batteryChangeDate: assetFormData.batteryChangeDate, status: assetFormData.status
                        };
                        try {
                            const res = await sendToDatabase("updateAsset", updatedAsset);
                            if(res.status === "success") { 
                                setAssets(assets.map(a => a.docId === updatedAsset.docId ? updatedAsset : a)); 
                                setSelectedAsset(updatedAsset); 
                                setIsAddModalOpen(false); 
                                setIsEditAssetMode(false);
                                setAlert({ message: "อัปเดตข้อมูลสำเร็จ", type: "success" }); 
                            } else { throw new Error(res.message); }
                        } catch(err) { setAlert({ message: err.message, type: "error" }); } 
                        finally { setLoading(false); setTimeout(() => setAlert(null), 3000); }
                    } 
                    // โหมดสร้างใหม่
                    else {
                        const newAsset = {
                            docId: Date.now().toString(), createdAt: new Date().toISOString(), recordedBy: `${currentUserData.name} ${currentUserData.surname}`,
                            id: assetFormData.id, name: assetFormData.name, model: assetFormData.model, serialNo: assetFormData.serialNo, manufacturer: assetFormData.manufacturer, vendor: assetFormData.vendor, technicianPhone: assetFormData.technicianPhone, department: assetFormData.department, receivedDate: assetFormData.receivedDate, warrantyExpire: assetFormData.warrantyExpire, lifspan: assetFormData.lifespan, batteryChangeDate: assetFormData.batteryChangeDate, status: assetFormData.status,
                            repairHistory: (assetFormData.repairDate || assetFormData.repairSymptom) ? [{ id: Date.now()+1, date: assetFormData.repairDate, symptom: assetFormData.repairSymptom, summary: assetFormData.repairSummary, fix: assetFormData.repairFix, downtime: assetFormData.repairDowntime, cost: assetFormData.repairCost, recordedBy: currentUserData.name }] : [],
                            maintainHistory: (assetFormData.maintainDate || assetFormData.maintainDetail) ? [{ id: Date.now()+4, date: assetFormData.maintainDate, detail: assetFormData.maintainDetail, by: assetFormData.maintainBy, nextDate: assetFormData.maintainNextDate, recordedBy: currentUserData.name }] : [],
                            calHistory: (assetFormData.calDate || assetFormData.calResult) ? [{ id: Date.now()+2, date: assetFormData.calDate, result: assetFormData.calResult, by: assetFormData.calBy, due: assetFormData.calDue, cerUrl: assetFormData.calCerUrl, recordedBy: currentUserData.name }] : [],
                            loanHistory: (assetFormData.loanDate || assetFormData.loanPerson) ? [{ id: Date.now()+3, date: assetFormData.loanDate, item: assetFormData.loanItem, name: assetFormData.loanPerson, amount: assetFormData.loanAmount, status: assetFormData.loanStatus, recordedBy: currentUserData.name }] : []
                        };
                        try {
                            const res = await sendToDatabase("addAsset", newAsset);
                            if(res.status === "success") { 
                                setAssets([newAsset, ...assets]); 
                                setIsAddModalOpen(false); 
                                setAssetFormData(initialFormState); 
                                setAddModalTab('general'); 
                                setAlert({ message: "ซิงค์ข้อมูลลง Google Sheets สำเร็จ", type: "success" }); 
                            } else { throw new Error(res.message); }
                        } catch(err) { setAlert({ message: err.message, type: "error" }); } 
                        finally { setLoading(false); setTimeout(() => setAlert(null), 3000); }
                    }
                };

                const handleAddHistory = async (e) => {
                    e.preventDefault();
                    const assetToUpdate = assets.find(a => a.docId === selectedAsset.docId);
                    if(!assetToUpdate) return;
                    setLoading(true);
                    let updatedAsset = { ...assetToUpdate };
                    
                    // 🔴 โหมดแก้ไขประวัติ
                    if (historyModal.isEdit) {
                        const updatedHistItem = { ...historyModal.data }; 
                        if (historyModal.type === 'repair') updatedAsset.repairHistory = updatedAsset.repairHistory.map(h => h.id === updatedHistItem.id ? updatedHistItem : h);
                        if (historyModal.type === 'maintain') updatedAsset.maintainHistory = updatedAsset.maintainHistory.map(h => h.id === updatedHistItem.id ? updatedHistItem : h);
                        if (historyModal.type === 'cal') updatedAsset.calHistory = updatedAsset.calHistory.map(h => h.id === updatedHistItem.id ? updatedHistItem : h);
                        if (historyModal.type === 'loan') updatedAsset.loanHistory = updatedAsset.loanHistory.map(h => h.id === updatedHistItem.id ? updatedHistItem : h);
                    } 
                    // โหมดเพิ่มประวัติใหม่
                    else {
                        const newHist = { ...historyModal.data, id: Date.now(), recordedBy: `${currentUserData.name} ${currentUserData.surname}` };
                        if (historyModal.type === 'repair') updatedAsset.repairHistory = [newHist, ...(updatedAsset.repairHistory || [])];
                        if (historyModal.type === 'maintain') updatedAsset.maintainHistory = [newHist, ...(updatedAsset.maintainHistory || [])];
                        if (historyModal.type === 'cal') updatedAsset.calHistory = [newHist, ...(updatedAsset.calHistory || [])];
                        if (historyModal.type === 'loan') updatedAsset.loanHistory = [newHist, ...(updatedAsset.loanHistory || [])];
                    }

                    try {
                        const res = await sendToDatabase("updateAsset", updatedAsset);
                        if(res.status === "success") { 
                            setAssets(assets.map(a => a.docId === updatedAsset.docId ? updatedAsset : a)); 
                            setSelectedAsset(updatedAsset); 
                            setHistoryModal({ open: false, type: '', data: {}, isEdit: false }); 
                            setAlert({ message: "อัปเดตประวัติสำเร็จ", type: "success" }); 
                        } else {
                            throw new Error(res.message);
                        }
                    } catch(err) { 
                        setAlert({ message: err.message, type: "error" }); 
                    } finally { 
                        setLoading(false); 
                        setTimeout(() => setAlert(null), 3000); 
                    }
                };

                const handleDeleteAsset = async (assetId) => {
                    if(window.confirm("คำเตือน: ยืนยันการลบข้อมูลนี้ออกจากระบบถาวร?")) {
                        setLoading(true);
                        try {
                            const res = await sendToDatabase("deleteAsset", { docId: assetId });
                            if(res.status === "success") { 
                                setAssets(assets.filter(a => a.docId !== assetId)); 
                                setView('dashboard'); 
                                setAlert({ message: "ลบข้อมูลสำเร็จ", type: "success" }); 
                            } else {
                                throw new Error(res.message);
                            }
                        } catch(err) { 
                            setAlert({ message: err.message, type: "error" }); 
                        } finally { 
                            setLoading(false); 
                            setTimeout(() => setAlert(null), 3000); 
                        }
                    }
                };

                const refreshData = async () => {
                    setLoading(true);
                    const db = await fetchDatabase();
                    setLoading(false);
                    setAlert({ message: db.success ? "อัปเดตข้อมูลล่าสุดแล้ว" : db.message, type: db.success ? "success" : "error" });
                    setTimeout(() => setAlert(null), 2000);
                };

                const handleExport = () => {
                    const headers = ["docId", "วันที่บันทึก", "ผู้บันทึก", "ID (รหัส)", "ชื่อเครื่องมือ", "ยี่ห้อ/รุ่น/ขนาด", "Serial No.", "ผู้ผลิต", "ผู้จำหน่าย", "เบอร์ช่าง", "แผนก", "รับเครื่อง", "หมดประกัน", "อายุใช้งาน", "เปลี่ยนแบตล่าสุด", "สถานะ"];
                    const rows = assets.map(a => [`"${a.docId||'-'}"`, `"${a.createdAt?new Date(a.createdAt).toLocaleString('th-TH'):'-'}"`, `"${a.recordedBy||'-'}"`, `"${a.id||'-'}"`, `"${a.name||'-'}"`, `"${a.model||'-'}"`, `"${a.serialNo||'-'}"`, `"${a.manufacturer||'-'}"`, `"${a.vendor||'-'}"`, `"${a.technicianPhone||'-'}"`, `"${a.department||'-'}"`, `"${formatToThaiDate(a.receivedDate)}"`, `"${formatToThaiDate(a.warrantyExpire)}"`, `"${calculateLifespan(a.receivedDate)}"`, `"${formatToThaiDate(a.batteryChangeDate)}"`, `"${a.status||'-'}"`]);
                    const content = "\uFEFF" + [headers, ...rows].map(r => r.join(",")).join("\n");
                    const blob = new Blob([content], { type: "text/csv;charset=utf-8;" });
                    const link = document.createElement("a");
                    link.href = URL.createObjectURL(blob);
                    link.download = `รายงานเครื่องมือแพทย์_${new Date().toLocaleDateString('th-TH').replace(/\//g, '-')}.csv`;
                    link.click();
                };

                const filteredAssets = useMemo(() => assets.filter(a => (String(a.name||"").toLowerCase().includes(searchQuery.toLowerCase()) || String(a.id||"").includes(searchQuery)) && (filterDept === 'ทั้งหมด' || a.department === filterDept)), [assets, searchQuery, filterDept]);

                if (!currentUserData) {
                    return <LoginView onLogin={handleLogin} loading={loading} error={alert?.type === 'error' ? alert.message : null} />;
                }

                const alertClasses = alert?.type === 'error' 
                    ? 'bg-rose-50 border-rose-500 text-rose-700' 
                    : 'bg-emerald-50 border-emerald-500 text-emerald-700';

                return (
                    <div className="bg-[#fcfdfe] min-h-screen pb-10">
                        {alert && (
                            <div className={`fixed top-5 left-1/2 -translate-x-1/2 z-[300] px-6 py-3 rounded-full border shadow-xl flex items-center gap-2 animate-fade-in ${alertClasses}`}>
                                {alert.type === 'error' ? <AlertCircle size={18} className="shrink-0" /> : <CircleCheck size={18} className="shrink-0" />}
                                <span className="font-bold text-sm leading-tight" dangerouslySetInnerHTML={{__html: alert.message}}></span>
                            </div>
                        )}

                        {loading && (
                            <div className="fixed inset-0 bg-white/60 backdrop-blur-sm z-[500] flex flex-col items-center justify-center gap-3">
                                <Loader2 className="animate-spin text-blue-600" size={50} />
                                <p className="text-blue-800 font-bold tracking-widest uppercase text-sm animate-pulse">Syncing Cloud Database...</p>
                            </div>
                        )}

                        <div className="max-w-6xl mx-auto px-4 pt-6 space-y-4">
                            <header className="flex flex-col md:flex-row justify-between items-center gap-4 py-2 border-b border-slate-200 no-print">
                                <div className="flex items-center gap-3 w-full md:w-auto justify-between md:justify-start">
                                    <div className="flex items-center gap-3">
                                        <div className="bg-blue-600 p-2.5 rounded-xl text-white shadow-md relative">
                                            <Cloud size={24} className="relative z-10" />
                                            <span className="absolute top-1 right-1 w-2 h-2 bg-emerald-400 rounded-full animate-ping z-0"></span>
                                        </div>
                                        <div>
                                            <h1 className="text-xl font-black text-slate-800 leading-none uppercase tracking-tighter">ระบบทะเบียนเครื่องมือแพทย์</h1>
                                            <p className="text-xs text-blue-600 font-bold flex items-center gap-1 mt-1 uppercase tracking-widest">
                                                <MapPin size={12} /> โรงพยาบาลยางชุมน้อย จังหวัดศรีสะเกษ
                                            </p>
                                        </div>
                                    </div>
                                </div>
                                <div className="flex flex-col md:flex-row items-center gap-3 w-full md:w-auto border-t md:border-none pt-4 md:pt-0 border-slate-200">
                                    <div className="bg-white border border-slate-300 rounded-xl px-4 py-2 flex items-center gap-3 shadow-sm w-full md:w-auto justify-center">
                                        <div className="text-right flex flex-col justify-center">
                                            <p className="text-slate-900 text-[13px] font-black leading-none">{currentUserData.name} {currentUserData.surname}</p>
                                            <p className="text-slate-500 text-[10px] font-bold uppercase tracking-widest mt-1">{currentUserData.position} | {currentUserData.department}</p>
                                        </div>
                                        <div className={`w-10 h-10 rounded-full flex items-center justify-center text-white shadow-inner ${currentUserData.role === 'admin' ? 'bg-gradient-to-br from-rose-500 to-rose-700' : 'bg-gradient-to-br from-blue-500 to-blue-700'}`}>
                                            {currentUserData.role === 'admin' ? <Shield size={18} /> : <User size={18} />}
                                        </div>
                                    </div>
                                    <div className="flex gap-2 w-full md:w-auto justify-center">
                                        <button onClick={refreshData} title="อัปเดตข้อมูล" className="p-2.5 bg-blue-50 text-blue-600 border border-blue-200 rounded-xl shadow-sm hover:bg-blue-100 transition-all">
                                            <RefreshCw size={18} />
                                        </button>
                                        {currentUserData.role === 'admin' && (
                                            <button onClick={() => setView(view === 'users' ? 'dashboard' : 'users')} title="จัดการผู้ใช้งาน" className={`p-2.5 rounded-xl border transition-all shadow-sm ${view === 'users' ? 'bg-slate-800 text-white border-slate-900' : 'bg-white border-slate-300 text-slate-600 hover:bg-slate-50'}`}>
                                                <Users size={18} />
                                            </button>
                                        )}
                                        <button onClick={handleExport} title="ส่งออก Excel" className="p-2.5 bg-emerald-50 text-emerald-600 border border-emerald-200 rounded-xl shadow-sm hover:bg-emerald-100 transition-all">
                                            <FileDown size={18} />
                                        </button>
                                        <button onClick={() => { setIsEditAssetMode(false); setAssetFormData(initialFormState); setAddModalTab('general'); setIsAddModalOpen(true); }} className="flex-1 md:flex-none bg-blue-600 text-white px-5 py-2.5 rounded-xl text-sm font-black border border-blue-700 shadow-md uppercase tracking-wide hover:bg-blue-700 active:scale-95 transition-all flex items-center justify-center gap-2">
                                            <Plus size={16} /> ลงทะเบียน
                                        </button>
                                        <button onClick={() => { setCurrentUserData(null); setView('dashboard'); }} title="ออกจากระบบ" className="p-2.5 bg-white border border-slate-300 rounded-xl shadow-sm text-rose-500 hover:bg-rose-50 transition-all">
                                            <LogOut size={18} />
                                        </button>
                                    </div>
                                </div>
                            </header>

                            {view === 'users' && currentUserData.role === 'admin' ? (
                                <div className="space-y-6 animate-fade-in py-4">
                                    <div className="flex flex-col md:flex-row justify-between md:items-end gap-4">
                                        <div>
                                            <h2 className="text-2xl font-black flex items-center gap-2">
                                                <Users className="text-blue-600"/> จัดการผู้ใช้งานระบบ
                                            </h2>
                                            <p className="text-sm font-bold text-slate-500">ซิงค์ผู้ใช้กับบัญชี Cloud (Google Sheets)</p>
                                        </div>
                                        <button onClick={() => setIsUserModalOpen(true)} className="bg-slate-900 text-white px-5 py-2.5 rounded-xl font-bold flex items-center justify-center gap-2 shadow-md hover:bg-slate-800 active:scale-95 transition-all">
                                            <UserPlus size={16}/> เพิ่มผู้ใช้ใหม่
                                        </button>
                                    </div>
                                    <div className="bg-white rounded-3xl border border-slate-300 shadow-sm overflow-hidden">
                                        <div className="overflow-x-auto">
                                            <table className="w-full text-left text-sm whitespace-nowrap">
                                                <thead className="bg-slate-50 border-b border-slate-200 text-slate-500 uppercase text-[11px] font-black tracking-widest">
                                                    <tr>
                                                        <th className="p-4">ชื่อ - นามสกุล</th>
                                                        <th className="p-4">ตำแหน่ง / หน่วยงาน</th>
                                                        <th className="p-4">Username (Login)</th>
                                                        <th className="p-4">สิทธิ์การใช้งาน</th>
                                                        <th className="p-4 text-center">จัดการ</th>
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y divide-slate-100">
                                                    {users.map(u => (
                                                        <tr key={u.id} className="hover:bg-slate-50/50">
                                                            <td className="p-4 font-black text-slate-800">{u.name} {u.surname}</td>
                                                            <td className="p-4 font-bold text-slate-500">
                                                                {u.position} <br/>
                                                                <span className="text-[10px] uppercase text-blue-500">{u.department}</span>
                                                            </td>
                                                            <td className="p-4 font-black">{u.username}</td>
                                                            <td className="p-4">
                                                                <span className={`px-2.5 py-1 rounded-lg text-[10px] font-black uppercase tracking-widest ${u.role === 'admin' ? 'bg-rose-100 text-rose-700' : 'bg-blue-100 text-blue-700'}`}>
                                                                    {u.role}
                                                                </span>
                                                            </td>
                                                            <td className="p-4 text-center">
                                                                <button onClick={() => handleDeleteUser(u.id)} disabled={u.id === currentUserData.id} className="p-2 bg-white border border-slate-200 rounded-lg text-slate-400 hover:text-rose-500 hover:bg-rose-50 disabled:opacity-30 disabled:hover:bg-white transition-all">
                                                                    <Trash2 size={16}/>
                                                                </button>
                                                            </td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>

                                    {isUserModalOpen && (
                                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[600] flex items-center justify-center p-4">
                                            <div className="bg-white w-full max-w-lg rounded-3xl shadow-2xl border border-slate-300 animate-fade-in flex flex-col max-h-[90vh]">
                                                <div className="p-6 md:p-8 border-b border-slate-100 flex justify-between items-center shrink-0">
                                                    <h2 className="text-lg font-black uppercase flex items-center gap-2 text-slate-800 m-0">
                                                        <UserPlus className="text-blue-600"/> เพิ่มผู้ใช้งาน
                                                    </h2>
                                                    <button type="button" onClick={() => setIsUserModalOpen(false)} className="text-slate-400 hover:text-rose-500 bg-slate-100 hover:bg-rose-50 p-2 rounded-full transition-all">
                                                        <X size={20}/>
                                                    </button>
                                                </div>
                                                <div className="p-6 md:p-8 overflow-y-auto no-scrollbar">
                                                    <form onSubmit={handleAddUser} className="space-y-4">
                                                        <div className="grid grid-cols-2 gap-4">
                                                            <InputField label="ชื่อ" value={userFormData.name} onChange={v => setUserFormData({...userFormData, name: v})} icon={<IdCard size={14} className="text-blue-500"/>}/>
                                                            <InputField label="นามสกุล" value={userFormData.surname} onChange={v => setUserFormData({...userFormData, surname: v})} icon={<IdCard size={14} className="text-blue-500"/>}/>
                                                        </div>
                                                        <div className="grid grid-cols-2 gap-4">
                                                            <InputField label="ตำแหน่ง" value={userFormData.position} onChange={v => setUserFormData({...userFormData, position: v})} icon={<Tag size={14} className="text-blue-500"/>}/>
                                                            <InputField label="หน่วยงาน" value={userFormData.department} options={DEPARTMENTS} onChange={v => setUserFormData({...userFormData, department: v})} icon={<Building2 size={14} className="text-blue-500"/>}/>
                                                        </div>
                                                        <div className="border-t border-slate-100 my-4 pt-4"></div>
                                                        <InputField label="Username" value={userFormData.username} onChange={v => setUserFormData({...userFormData, username: v})} icon={<User size={14} className="text-blue-500"/>}/>
                                                        <InputField label="Password" type="text" value={userFormData.password} onChange={v => setUserFormData({...userFormData, password: v})} icon={<Lock size={14} className="text-blue-500"/>}/>
                                                        <InputField label="สิทธิ์ (Role)" value={userFormData.role} options={["user", "admin"]} onChange={v => setUserFormData({...userFormData, role: v})} icon={<Shield size={14} className="text-blue-500"/>}/>
                                                        <button type="submit" className="w-full py-4 bg-blue-600 text-white rounded-xl font-black uppercase shadow-lg mt-6 hover:bg-blue-700 active:scale-95 transition-all">บันทึกข้อมูล</button>
                                                    </form>
                                                </div>
                                            </div>
                                        </div>
                                    )}

                                </div>
                            ) : view === 'dashboard' ? (
                                <div className="space-y-6 animate-fade-in py-4">
                                    <div className="relative bg-white rounded-3xl border border-slate-300 p-6 overflow-hidden shadow-sm">
                                        <div className="relative z-10 flex flex-col md:flex-row items-center gap-6">
                                            <div className="flex-1 space-y-4 w-full">
                                                <h2 className="text-[24px] md:text-[26px] font-black text-slate-900 leading-tight uppercase tracking-tight border-l-4 border-blue-600 pl-4">
                                                    Asset Tracking <span className="text-blue-600">รพ.ยางชุมน้อย</span>
                                                </h2>
                                                <div className="relative w-full max-w-lg">
                                                    <Search className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" size={18} />
                                                    <input type="text" placeholder="ค้นหา รหัส หรือ ชื่อเครื่องมือ..." className="w-full pl-11 pr-4 py-3 bg-slate-50 border border-slate-300 rounded-xl text-[16px] outline-none font-bold focus:border-blue-500 transition-all shadow-inner" value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} />
                                                </div>
                                            </div>
                                            <div className="hidden md:flex items-center justify-center w-28 h-28 bg-blue-50 rounded-2xl border border-blue-100">
                                                <Stethoscope size={50} className="text-blue-500 opacity-60" />
                                            </div>
                                        </div>
                                    </div>
                                    <div className="flex flex-wrap gap-2 pb-2 justify-start md:justify-center px-1">
                                        <button onClick={() => setFilterDept('ทั้งหมด')} className={`px-4 py-1.5 rounded-full text-[12px] font-bold whitespace-nowrap transition-all border ${filterDept === 'ทั้งหมด' ? 'bg-slate-800 text-white border-slate-800 shadow-md' : 'bg-white text-slate-600 border-slate-300 hover:bg-slate-50'}`}>ทั้งหมด</button>
                                        {DEPARTMENTS.map(d => (
                                            <button key={d} onClick={() => setFilterDept(d)} className={`px-4 py-1.5 rounded-full text-[12px] font-bold whitespace-nowrap transition-all border ${filterDept === d ? 'bg-slate-800 text-white border-slate-800 shadow-md' : 'bg-white text-slate-600 border-slate-300 hover:bg-slate-50'}`}>{d}</button>
                                        ))}
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
                                        {filteredAssets.map(asset => (
                                            <div key={asset.docId} className="relative bg-white rounded-3xl p-5 border border-slate-200 shadow-sm hover:shadow-xl hover:-translate-y-1 hover:border-blue-300 transition-all duration-300 flex flex-col group">
                                                <div className="absolute -top-3 -right-2 flex flex-col gap-1 items-end z-20 pointer-events-none">
                                                    {isBatteryExpired(asset.batteryChangeDate) && (
                                                        <div className="bg-rose-500 text-white text-[10px] font-black px-3 py-1.5 rounded-full animate-pulse shadow-lg flex items-center gap-1 border-2 border-white uppercase tracking-widest">
                                                            <Icon name="alert-circle" size={12}/> เปลี่ยนแบต!
                                                        </div>
                                                    )}
                                                    {isWarrantyExpired(asset.warrantyExpire) && (
                                                        <div className="bg-orange-500 text-white text-[10px] font-black px-3 py-1.5 rounded-full animate-pulse shadow-lg flex items-center gap-1 border-2 border-white uppercase tracking-widest">
