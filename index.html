                        {isAddModalOpen && (
                            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[150] flex items-center justify-center p-4 md:p-6">
                                <div className="bg-white w-full max-w-5xl rounded-[2.5rem] shadow-2xl border border-slate-300 overflow-hidden flex flex-col max-h-[90vh] animate-fade-in">
                                    <div className="bg-blue-600 p-6 flex justify-between items-center text-white shrink-0">
                                        <h2 className="text-xl font-black uppercase tracking-widest flex items-center gap-3">
                                            {isEditAssetMode ? <Edit size={26} /> : <PlusCircle size={26} />} 
                                            {isEditAssetMode ? "แก้ไขข้อมูลทั่วไป" : "ลงทะเบียนเครื่องมือใหม่"}
                                        </h2>
                                        <button onClick={() => setIsAddModalOpen(false)} className="hover:rotate-90 transition-all bg-white/20 p-2 rounded-full">
                                            <X size={20}/>
                                        </button>
                                    </div>
                                    
                                    {/* 🔴 ซ่อนแท็บประวัติ ถ้าเป็นการเปิดเข้ามาเพื่อ "แก้ไขข้อมูลทั่วไป" */}
                                    {!isEditAssetMode && (
                                        <div className="flex bg-slate-100 px-6 pt-4 gap-2 border-b border-slate-200 shrink-0 overflow-x-auto no-scrollbar">
                                            {[
                                                { id: 'general', label: '1. ข้อมูลทั่วไป', icon: <FileText size={16}/> }, 
                                                { id: 'repair', label: '2. ประวัติซ่อม', icon: <Wrench size={16}/> }, 
                                                { id: 'maintain', label: '3. บำรุงรักษา', icon: <Settings size={16}/> },
                                                { id: 'cal', label: '4. ประวัติ CAL', icon: <Activity size={16}/> }, 
                                                { id: 'loan', label: '5. ยืม-คืน', icon: <ArrowLeftRight size={16}/> }
                                            ].map(tab => (
                                                <button key={tab.id} type="button" onClick={() => setAddModalTab(tab.id)} className={`flex items-center gap-2 px-6 py-3.5 text-[13px] font-black uppercase transition-all rounded-t-2xl border-x border-t ${addModalTab === tab.id ? 'bg-white border-slate-200 text-blue-600 shadow-[0_4px_0_0_#fff]' : 'border-transparent text-slate-400 hover:text-slate-700 hover:bg-slate-200'}`}>
                                                    {tab.icon} {tab.label}
                                                </button>
                                            ))}
                                        </div>
                                    )}

                                    <form onSubmit={handleAddAsset} className="flex flex-col flex-1 overflow-hidden bg-white">
                                        <div className="p-6 md:p-10 overflow-y-auto flex-1 no-scrollbar">
                                            {addModalTab === 'general' && (
                                                <div className="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-5">
                                                    <InputField label="รหัสครุภัณฑ์ (ID) *" value={assetFormData.id} onChange={v => setAssetFormData({...assetFormData, id: v})} icon={<Hash size={14} className="text-blue-500"/>} />
                                                    <InputField label="ชื่อเครื่องมือแพทย์ *" value={assetFormData.name} onChange={v => setAssetFormData({...assetFormData, name: v})} icon={<Tag size={14} className="text-blue-500"/>} />
                                                    <InputField label="ยี่ห้อ/รุ่น/ขนาด" value={assetFormData.model} onChange={v => setAssetFormData({...assetFormData, model: v})} icon={<Box size={14} className="text-blue-500"/>} />
                                                    <InputField label="Serial No." value={assetFormData.serialNo} onChange={v => setAssetFormData({...assetFormData, serialNo: v})} icon={<Hash size={14} className="text-blue-500"/>} />
                                                    
                                                    <InputField label="ผู้ผลิต" value={assetFormData.manufacturer} onChange={v => setAssetFormData({...assetFormData, manufacturer: v})} icon={<Building2 size={14} className="text-blue-500"/>} />
                                                    <InputField label="ผู้จำหน่าย" value={assetFormData.vendor} onChange={v => setAssetFormData({...assetFormData, vendor: v})} icon={<Building2 size={14} className="text-blue-500"/>} />
                                                    <InputField label="เบอร์ช่างติดต่อ" value={assetFormData.technicianPhone} onChange={v => setAssetFormData({...assetFormData, technicianPhone: v})} icon={<Phone size={14} className="text-blue-500"/>} />
                                                    
                                                    <InputField label="แผนกที่รับผิดชอบ" value={assetFormData.department} options={DEPARTMENTS} onChange={v => setAssetFormData({...assetFormData, department: v})} icon={<MapPin size={14} className="text-blue-500"/>} />
                                                    
                                                    <div className="col-span-1 md:col-span-2 border-t border-slate-100 my-2 pt-4"></div>
                                                    
                                                    <InputField label="วันที่รับเครื่อง" type="date" value={assetFormData.receivedDate} onChange={v => setAssetFormData({...assetFormData, receivedDate: v})} icon={<Calendar size={14} className="text-emerald-500"/>} />
                                                    <InputField label="วันหมดประกัน" type="date" value={assetFormData.warrantyExpire} onChange={v => setAssetFormData({...assetFormData, warrantyExpire: v})} icon={<ShieldCheck size={14} className="text-emerald-500"/>} />
                                                    <InputField label="อายุการใช้งาน (Auto)" value={assetFormData.lifespan} onChange={v => setAssetFormData({...assetFormData, lifespan: v})} icon={<Clock size={14} className="text-emerald-500"/>} />
                                                    <InputField label="วันเปลี่ยนแบตเตอรี่ล่าสุด" type="date" value={assetFormData.batteryChangeDate} onChange={v => setAssetFormData({...assetFormData, batteryChangeDate: v})} icon={<Battery size={14} className="text-emerald-500"/>} />
                                                    
                                                    <div className="col-span-1 md:col-span-2">
                                                        <InputField label="สถานะปัจจุบัน" value={assetFormData.status} options={STATUS_OPTIONS} onChange={v => setAssetFormData({...assetFormData, status: v})} icon={<Activity size={14} className="text-blue-500"/>} />
                                                    </div>
                                                </div>
                                            )}
                                            {addModalTab === 'repair' && (
                                                <div className="space-y-5 max-w-2xl mx-auto">
                                                    <InputField label="วันที่รับเครื่อง (ซ่อม)" type="date" value={assetFormData.repairDate} onChange={v => setAssetFormData({...assetFormData, repairDate: v})} icon={<Calendar size={14} className="text-blue-500"/>} />
                                                    <InputField label="อาการ" value={assetFormData.repairSymptom} onChange={v => setAssetFormData({...assetFormData, repairSymptom: v})} icon={<AlertCircle size={14} className="text-blue-500"/>} />
                                                    <InputField label="สรุป" value={assetFormData.repairSummary} onChange={v => setAssetFormData({...assetFormData, repairSummary: v})} icon={<ClipboardList size={14} className="text-blue-500"/>} />
                                                    <InputField label="วิธีการแก้ไข" value={assetFormData.repairFix} onChange={v => setAssetFormData({...assetFormData, repairFix: v})} icon={<Wrench size={14} className="text-blue-500"/>} />
                                                    <div className="grid grid-cols-2 gap-4">
                                                        <InputField label="Downtime (วัน/ชม.)" placeholder="เช่น 3 วัน, 5 ชม." value={assetFormData.repairDowntime} onChange={v => setAssetFormData({...assetFormData, repairDowntime: v})} icon={<Clock size={14} className="text-blue-500"/>} />
                                                        <InputField label="ค่าใช้จ่าย (บาท)" type="number" placeholder="0" value={assetFormData.repairCost} onChange={v => setAssetFormData({...assetFormData, repairCost: v})} icon={<Banknote size={14} className="text-blue-500"/>} />
                                                    </div>
                                                </div>
                                            )}
                                            {addModalTab === 'maintain' && (
                                                <div className="space-y-5 max-w-2xl mx-auto">
                                                    <InputField label="วันที่บำรุงรักษา" type="date" value={assetFormData.maintainDate} onChange={v => setAssetFormData({...assetFormData, maintainDate: v})} icon={<Calendar size={14} className="text-purple-500"/>} />
                                                    <InputField label="รายละเอียด/รายการที่ทำ" value={assetFormData.maintainDetail} onChange={v => setAssetFormData({...assetFormData, maintainDetail: v})} icon={<ClipboardList size={14} className="text-purple-500"/>} />
                                                    <InputField label="ผู้ดำเนินการ" value={assetFormData.maintainBy} onChange={v => setAssetFormData({...assetFormData, maintainBy: v})} icon={<User size={14} className="text-purple-500"/>} />
                                                    <InputField label="วันครบกำหนด (รอบถัดไป)" type="date" value={assetFormData.maintainNextDate} onChange={v => setAssetFormData({...assetFormData, maintainNextDate: v})} icon={<CalendarClock size={14} className="text-purple-500"/>} />
                                                </div>
                                            )}
                                            {addModalTab === 'cal' && (
                                                <div className="space-y-5 max-w-2xl mx-auto">
                                                    <InputField label="CAL date" type="date" value={assetFormData.calDate} onChange={v => setAssetFormData({...assetFormData, calDate: v})} icon={<Calendar size={14} className="text-emerald-500"/>} />
                                                    <InputField label="ผลการ CAL" value={assetFormData.calResult} onChange={v => setAssetFormData({...assetFormData, calResult: v})} icon={<CircleCheck size={14} className="text-emerald-500"/>} />
                                                    <InputField label="ผู้ดำเนินการ" value={assetFormData.calBy} onChange={v => setAssetFormData({...assetFormData, calBy: v})} icon={<User size={14} className="text-emerald-500"/>} />
                                                    <InputField label="Due Date (ครั้งต่อไป)" type="date" value={assetFormData.calDue} onChange={v => setAssetFormData({...assetFormData, calDue: v})} icon={<CalendarClock size={14} className="text-emerald-500"/>} />
                                                    <ImageUploadField label="แนบรูปใบ Cer (รองรับการวาง Ctrl+V)" value={assetFormData.calCerUrl} onChange={v => setAssetFormData({...assetFormData, calCerUrl: v})} />
                                                </div>
                                            )}
                                            {addModalTab === 'loan' && (
                                                <div className="space-y-5 max-w-2xl mx-auto">
                                                    <InputField label="วันที่ยืม" type="date" value={assetFormData.loanDate} onChange={v => setAssetFormData({...assetFormData, loanDate: v})} icon={<Calendar size={14} className="text-orange-500"/>} />
                                                    <InputField label="เครื่องที่ยืม" value={assetFormData.loanItem} onChange={v => setAssetFormData({...assetFormData, loanItem: v})} icon={<Tag size={14} className="text-orange-500"/>} />
                                                    <InputField label="จำนวน" type="number" value={assetFormData.loanAmount} onChange={v => setAssetFormData({...assetFormData, loanAmount: v})} icon={<Hash size={14} className="text-orange-500"/>} />
                                                    <InputField label="ผู้ที่ยืม/หน่วยงาน" value={assetFormData.loanPerson} onChange={v => setAssetFormData({...assetFormData, loanPerson: v})} icon={<Users size={14} className="text-orange-500"/>} />
                                                    <InputField label="สถานะ" options={["ยังไม่คืน", "คืนแล้ว"]} value={assetFormData.loanStatus} onChange={v => setAssetFormData({...assetFormData, loanStatus: v})} icon={<ArrowLeftRight size={14} className="text-orange-500"/>} />
                                                </div>
                                            )}
                                        </div>
                                        <div className="p-6 md:p-8 bg-slate-50 border-t border-slate-200 flex gap-4 shrink-0">
                                            <button type="button" onClick={() => setIsAddModalOpen(false)} className="flex-1 py-4 font-black text-slate-500 uppercase text-[13px] tracking-widest hover:bg-slate-200 rounded-2xl transition-all border border-slate-300 bg-white">ยกเลิก</button>
                                            <button type="submit" className="flex-[2] py-4 bg-blue-600 text-white rounded-2xl font-black uppercase text-[14px] tracking-widest shadow-xl shadow-blue-200 hover:bg-blue-700 active:scale-95 transition-all flex justify-center items-center gap-2">
                                                <Save size={20} /> บันทึกข้อมูล
                                            </button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        )}

                        {/* Modal เพิ่ม/แก้ไข ประวัติภายหลัง */}
                        {historyModal.open && (
                            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[200] flex items-center justify-center p-4">
                                <div className="bg-white w-full max-w-lg rounded-[2.5rem] p-8 shadow-2xl border border-slate-300 animate-fade-in overflow-hidden relative max-h-[90vh] flex flex-col">
                                    <div className={`absolute top-0 left-0 w-full h-2 shrink-0 ${historyModal.type === 'repair' ? 'bg-blue-500' : historyModal.type === 'maintain' ? 'bg-purple-500' : historyModal.type === 'cal' ? 'bg-emerald-500' : 'bg-orange-500'}`}></div>
                                    <h2 className="text-lg font-black uppercase mb-6 flex justify-between items-center text-slate-800 shrink-0">
                                        <span className="flex items-center gap-2">
                                            {historyModal.type === 'repair' ? <Wrench className="text-blue-600"/> : historyModal.type === 'maintain' ? <Settings className="text-purple-600"/> : historyModal.type === 'cal' ? <Activity className="text-emerald-600"/> : <ArrowLeftRight className="text-orange-600"/>}
                                            {/* 🔴 เปลี่ยนหัวข้อตามโหมด แก้ไข หรือ เพิ่มใหม่ */}
                                            {historyModal.isEdit ? 'แก้ไขข้อมูล' : 'เพิ่มข้อมูล'}{historyModal.type === 'repair' ? 'การซ่อม' : historyModal.type === 'maintain' ? 'การบำรุงรักษา' : historyModal.type === 'cal' ? 'การสอบเทียบ' : 'การยืม-คืน'}
                                        </span>
                                        <button onClick={() => setHistoryModal({ open: false, type: '', data: {}, isEdit: false })} className="text-slate-400 hover:text-slate-800">
                                            <X size={24}/>
                                        </button>
                                    </h2>
                                    <div className="overflow-y-auto no-scrollbar flex-1 pb-4">
                                        <form onSubmit={handleAddHistory} className="space-y-4">
                                            {historyModal.type === 'repair' && (
                                                <>
                                                    <InputField label="วันที่รับเครื่อง(ซ่อม)" type="date" value={historyModal.data.date || ''} icon={<Calendar size={14} className="text-blue-500"/>} onChange={v => setHistoryModal({...historyModal, data: {...historyModal.data, date: v}})} />
                                                    <InputField label="อาการ" value={historyModal.data.symptom || ''} icon={<AlertCircle size={14} className="text-blue-500"/>} onChange={v => setHistoryModal({...historyModal, data: {...historyModal.data, symptom: v}})} />
                                                    <InputField label="สรุป" value={historyModal.data.summary || ''} icon={<ClipboardList size={14} className="text-blue-500"/>} onChange={v => setHistoryModal({...historyModal, data: {...historyModal.data, summary: v}})} />
                                                    <InputField label="วิธีการแก้ไข" value={historyModal.data.fix || ''} icon={<Wrench size={14} className="text-blue-500"/>} onChange={v => setHistoryModal({...historyModal, data: {...historyModal.data, fix: v}})} />
                                                    <div className="grid grid-cols-2 gap-4">
                                                        <InputField label="Downtime (วัน/ชม.)" placeholder="เช่น 3 วัน" value={historyModal.data.downtime || ''} icon={<Clock size={14} className="text-blue-500"/>} onChange={v => setHistoryModal({...historyModal, data: {...historyModal.data, downtime: v}})} />
                                                        <InputField label="ค่าใช้จ่าย (บาท)" type="number" placeholder="0" value={historyModal.data.cost || ''} icon={<Banknote size={14} className="text-blue-500"/>} onChange={v => setHistoryModal({...historyModal, data: {...historyModal.data, cost: v}})} />
                                                    </div>
                                                </>
                                            )}
                                            {historyModal.type === 'maintain' && (
                                                <>
                                                    <InputField label="วันที่บำรุงรักษา" type="date" value={historyModal.data.date || ''} icon={<Calendar size={14} className="text-purple-500"/>} onChange={v => setHistoryModal({...historyModal, data: {...historyModal.data, date: v}})} />
                                                    <InputField label="รายละเอียด/รายการที่ทำ" value={historyModal.data.detail || ''} icon={<ClipboardList size={14} className="text-purple-500"/>} onChange={v => setHistoryModal({...historyModal, data: {...historyModal.data, detail: v}})} />
                                                    <InputField label="ผู้ดำเนินการ" value={historyModal.data.by || ''} icon={<User size={14} className="text-purple-500"/>} onChange={v => setHistoryModal({...historyModal, data: {...historyModal.data, by: v}})} />
                                                    <InputField label="วันครบกำหนด (รอบถัดไป)" type="date" value={historyModal.data.nextDate || ''} icon={<CalendarClock size={14} className="text-purple-500"/>} onChange={v => setHistoryModal({...historyModal, data: {...historyModal.data, nextDate: v}})} />
                                                </>
                                            )}
                                            {historyModal.type === 'cal' && (
                                                <>
                                                    <InputField label="CAL Date" type="date" value={historyModal.data.date || ''} icon={<Calendar size={14} className="text-emerald-500"/>} onChange={v => setHistoryModal({...historyModal, data: {...historyModal.data, date: v}})} />
                                                    <InputField label="ผลการ CAL" value={historyModal.data.result || ''} icon={<CircleCheck size={14} className="text-emerald-500"/>} onChange={v => setHistoryModal({...historyModal, data: {...historyModal.data, result: v}})} />
                                                    <InputField label="ผู้ดำเนินการ" value={historyModal.data.by || ''} icon={<User size={14} className="text-emerald-500"/>} onChange={v => setHistoryModal({...historyModal, data: {...historyModal.data, by: v}})} />
                                                    <InputField label="Due Date" type="date" value={historyModal.data.due || ''} icon={<CalendarClock size={14} className="text-emerald-500"/>} onChange={v => setHistoryModal({...historyModal, data: {...historyModal.data, due: v}})} />
                                                    
                                                    <ImageUploadField label="แนบรูปใบ Cer (รองรับการวาง Ctrl+V)" value={historyModal.data.cerUrl || ''} onChange={v => setHistoryModal({...historyModal, data: {...historyModal.data, cerUrl: v}})} />
                                                </>
                                            )}
                                            {historyModal.type === 'loan' && (
                                                <>
                                                    <InputField label="วันที่ยืม" type="date" value={historyModal.data.date || ''} icon={<Calendar size={14} className="text-orange-500"/>} onChange={v => setHistoryModal({...historyModal, data: {...historyModal.data, date: v}})} />
                                                    <InputField label="เครื่องที่ยืม" value={historyModal.data.item || ''} icon={<Tag size={14} className="text-orange-500"/>} onChange={v => setHistoryModal({...historyModal, data: {...historyModal.data, item: v}})} />
                                                    <InputField label="จำนวน" type="number" value={historyModal.data.amount || ''} icon={<Hash size={14} className="text-orange-500"/>} onChange={v => setHistoryModal({...historyModal, data: {...historyModal.data, amount: v}})} />
                                                    <InputField label="ผู้ที่ยืม" value={historyModal.data.name || ''} icon={<Users size={14} className="text-orange-500"/>} onChange={v => setHistoryModal({...historyModal, data: {...historyModal.data, name: v}})} />
                                                    <InputField label="สถานะ" options={["ยังไม่คืน", "คืนแล้ว"]} value={historyModal.data.status || ''} icon={<ArrowLeftRight size={14} className="text-orange-500"/>} onChange={v => setHistoryModal({...historyModal, data: {...historyModal.data, status: v}})} />
                                                </>
                                            )}
                                            <button className={`w-full py-4 text-white rounded-2xl font-black uppercase mt-4 shadow-xl transition-all active:scale-95 flex items-center justify-center gap-2 ${historyModal.type === 'repair' ? 'bg-blue-600 shadow-blue-200 hover:bg-blue-700' : historyModal.type === 'maintain' ? 'bg-purple-600 shadow-purple-200 hover:bg-purple-700' : historyModal.type === 'cal' ? 'bg-emerald-600 shadow-emerald-200 hover:bg-emerald-700' : 'bg-orange-600 shadow-orange-200 hover:bg-orange-700'}`}>
                                                <Save size={18} /> อัปเดตข้อมูล
                                            </button>
                                        </form>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Modal สำหรับกดดูรูปใบ Cer แบบเต็มจอ */}
                        {viewImageModal && (
                            <div className="fixed inset-0 bg-slate-900/90 backdrop-blur-sm z-[999] flex items-center justify-center p-4 animate-fade-in" onClick={() => setViewImageModal(null)}>
                                <button className="absolute top-4 right-4 md:top-8 md:right-8 text-white bg-white/20 p-3 rounded-full hover:bg-rose-500 hover:text-white transition-all shadow-lg" onClick={(e) => { e.stopPropagation(); setViewImageModal(null); }}>
                                    <X size={24}/>
                                </button>
                                <img src={viewImageModal} alt="Certificate" className="max-w-full max-h-[90vh] object-contain rounded-xl shadow-2xl" onClick={(e) => e.stopPropagation()} />
                            </div>
                        )}

                    </div>
                );
            };

            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<App />);
        })();
    </script>
</body>
</html>
